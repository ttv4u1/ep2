<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Penguatkuasa v83 - Restoration</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .version-box { background: linear-gradient(45deg, #b45309, #fbbf24); color: #451a03; padding: 2px 10px; border-radius: 8px; font-weight: 900; font-size: 0.75em; }
        .section-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1.2rem; }
        .form-input-modern { width: 100%; padding: 10px 14px; border-radius: 10px; border: 2px solid #cbd5e1; font-weight: 700; font-size: 14px; color: #1e293b; }
        .input-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .premium-gold-btn { background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24); animation: shine 3s infinite; color: #451a03; }
        @keyframes shine { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-indigo-600 uppercase text-[10px]">Memproses Data v83...</p>
    </div>

    <!-- Login -->
    <section id="landing-screen" class="fixed inset-0 z-[3000] flex items-center justify-center bg-[#020617]">
        <div class="p-8 text-center bg-white/5 backdrop-blur-xl rounded-[40px] border border-white/10 w-[90%] max-w-sm">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 uppercase italic">e-Penguatkuasa <span class="version-box">v83</span></h1>
            <button onclick="loginGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl mt-8 uppercase text-sm">Masuk Sistem</button>
        </div>
    </section>

    <!-- App Content -->
    <div id="app-content" class="hidden">
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-8">
                <h2 class="font-black text-slate-800 text-xs uppercase">BORANG <span class="version-box">V83</span></h2>
            </div>
            <div class="flex items-center gap-1 sm:gap-2">
                <button onclick="resetForm()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg font-black text-[10px] uppercase">Baru</button>
                <button onclick="toggleHistory()" class="px-3 py-2 bg-amber-500 text-white rounded-lg font-black text-[10px] uppercase">Rekod</button>
                <button onclick="printReport()" class="px-3 py-2 bg-slate-900 text-white rounded-lg font-black text-[10px] uppercase">Cetak</button>
                <button onclick="toggleProfile()" class="w-8 h-8 rounded-full border border-indigo-200 overflow-hidden bg-indigo-50 flex items-center justify-center">
                    <img id="navAvatar" src="" class="w-full h-full object-cover">
                </button>
            </div>
        </header>

        <main class="p-4 max-w-7xl mx-auto">
            <form id="mainForm">
                <!-- Section A: Maklumat Kes -->
                <div class="section-card">
                    <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> A. Maklumat Kes
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                        <div class="col-span-1"><label class="input-label">BIL</label><input type="text" name="BIL" class="form-input-modern uppercase" placeholder="001/2026"></div>
                        <div><label class="input-label">TAHUN</label><input type="number" name="TAHUN" id="f_tahun" class="form-input-modern"></div>
                        <div><label class="input-label">BULAN</label>
                            <select name="BULAN" id="f_bulan" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="col-span-2 md:col-span-3"><label class="input-label">PEGAWAI</label><input type="text" id="form_staff" name="PENGUATKUASA" class="form-input-modern bg-slate-50 uppercase" readonly></div>
                        
                        <div class="col-span-2"><label class="input-label">KATEGORI KES</label><input type="text" name="KATEGORI_KES" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">NO REPOT POLIS</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern uppercase"></div>
                        <div><label class="input-label">TARIKH</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div><label class="input-label">MASA</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                    </div>
                </div>

                <!-- Input Haiwan & Karkas (Dipendekkan, sama seperti logic v82 tetapi pastikan name tag betul) -->
                <!-- ... Sila isi input Haiwan di sini mengikut v82 ... -->

                <!-- NILAI & SIMPAN -->
                <div class="section-card border-t-8 border-indigo-600">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="col-span-2"><label class="input-label">JUMLAH NILAI (RM)</label><input type="text" id="total_rm" name="JUMLAH_NILAI_KESELURUHAN" class="form-input-modern text-2xl font-black text-indigo-700 bg-transparent border-none" readonly value="RM 0.00"></div>
                        <div class="col-span-2 flex items-end">
                            <button type="button" onclick="submitData()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition uppercase">Simpan & Sync Semua Platform</button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- SIDEBAR REKOD (DATABASE) -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-md h-full bg-slate-50 z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Database <span class="text-indigo-600">Rekod</span></h2>
            <button onclick="toggleHistory()"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="space-y-3">
            <!-- Data Rekod Akan Muncul Di Sini -->
        </div>
    </aside>

    <!-- SIDEBAR PROFIL -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl uppercase">Profil Pegawai</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-4">
            <div id="adminBadge" class="hidden bg-red-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase inline-block">Super Admin</div>
            <div><label class="input-label">Nama</label><input type="text" id="p_name" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred</label><input type="text" id="p_gred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Cawangan</label><input type="text" id="p_caw" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase shadow-md">Update Profil</button>
            
            <div id="adminControls" class="hidden pt-6 border-t">
                <button onclick="openAdminPanel()" class="premium-gold-btn w-full font-black py-4 rounded-xl uppercase shadow-lg text-xs">
                    <i data-lucide="shield-check" class="inline w-4 h-4 mr-2"></i> Panel Kawalan Admin
                </button>
            </div>
            
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-8">Log Keluar</button>
        </div>
    </aside>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let isSuperAdmin = false;

        // AUTH & RECOVERY LOGIC
        firebase.auth().onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                
                // FORCE ADMIN IF EMAIL MATCHES
                if(user.email === 'ttv4u1@gmail.com') {
                    isSuperAdmin = true;
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.getElementById('adminControls').classList.remove('hidden');
                }
                
                await loadProfile(user);
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.data() || {};
            
            // Re-check role from DB
            if(d.role === 'ADMIN') {
                isSuperAdmin = true;
                document.getElementById('adminBadge').classList.remove('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
            }

            document.getElementById('navAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}`;
            document.getElementById('p_name').value = d.name || '';
            document.getElementById('p_gred').value = d.gred || '';
            document.getElementById('p_caw').value = d.cawangan || '';
            if(d.name) document.getElementById('form_staff').value = `${d.name} (${d.gred}) / ${d.cawangan}`.toUpperCase();
        }

        // REKOD / HISTORY LOGIC (FIXED)
        function toggleHistory() {
            const s = document.getElementById('historySidebar');
            if(s.style.left === '0px') {
                s.style.left = '-100%';
            } else {
                s.style.left = '0px';
                fetchHistory();
            }
        }

        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="text-center p-8 animate-pulse text-xs font-bold text-slate-400">MEMANGGIL DATA DARI CLOUD...</div>';
            
            try {
                let q;
                const user = firebase.auth().currentUser;
                
                // Jika admin, tunjuk semua. Jika user, tunjuk rekod sendiri sahaja.
                if(isSuperAdmin) {
                    q = db.collection("reports").orderBy("timestamp", "desc").limit(50);
                } else {
                    q = db.collection("reports").where("userID", "==", user.uid).orderBy("timestamp", "desc").limit(50);
                }

                const snap = await q.get();
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center p-8 text-xs font-bold text-slate-400">TIADA REKOD DIJUMPAI</div>';
                    return;
                }

                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition cursor-pointer";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[9px] font-black text-indigo-600 uppercase">${d.BIL || 'BIL: -'}</span>
                                <h4 class="font-bold text-xs uppercase mt-1">${d.KATEGORI_KES || 'TIADA KATEGORI'}</h4>
                                <p class="text-[9px] text-slate-500 mt-1 uppercase"><i data-lucide="map-pin" class="w-2 h-2 inline"></i> ${d.LOKASI_KEJADIAN || '-'}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-xs text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0'}</p>
                                <p class="text-[8px] text-slate-400 mt-1 uppercase">${d.BULAN} ${d.TAHUN}</p>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) {
                list.innerHTML = `<div class="text-red-500 text-[10px] p-4">RALAT: ${e.message}</div>`;
            }
        }

        // SUBMISSION
        async function submitData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            const formData = new FormData(document.getElementById('mainForm'));
            const data = Object.fromEntries(formData.entries());
            data.userID = firebase.auth().currentUser.uid;
            data.timestamp = firebase.firestore.FieldValue.serverTimestamp();

            try {
                // 1. Firestore
                await db.collection("reports").add(data);
                
                // 2. Spreadsheet
                if(SCRIPT_URL.startsWith('http')) {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }

                alert("DATA BERJAYA DISIMPAN KE CLOUD & SPREADSHEET!");
                resetForm();
            } catch (e) {
                alert("RALAT SIMPAN: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('f_tahun').value = new Date().getFullYear();
            document.getElementById('total_rm').value = "RM 0.00";
        }

        function toggleProfile() {
            const s = document.getElementById('profileSidebar');
            s.style.right = s.style.right === '0px' ? '-100%' : '0px';
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const role = (user.email === 'ttv4u1@gmail.com') ? 'ADMIN' : 'USER';
            await db.collection("users").doc(user.uid).set({
                name: document.getElementById('p_name').value.toUpperCase(),
                gred: document.getElementById('p_gred').value.toUpperCase(),
                cawangan: document.getElementById('p_caw').value.toUpperCase(),
                role: role
            }, {merge:true});
            alert("Profil dikemaskini!");
            location.reload();
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        document.getElementById('f_tahun').value = new Date().getFullYear();
    </script>
</body>
</html>
