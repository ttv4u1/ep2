<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Penguatkuasa v82</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .version-box {
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24);
            color: #451a03; padding: 2px 10px; border-radius: 8px; font-weight: 900; font-size: 0.75em;
        }
        .section-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1.2rem; }
        .form-input-modern {
            width: 100%; padding: 10px 14px; border-radius: 10px; border: 2px solid #cbd5e1;
            font-weight: 700; color: #1e293b; font-size: 14px;
        }
        .input-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .grid-animals { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .premium-gold-btn { background: linear-gradient(45deg, #b45309, #fbbf24); color: white; font-weight: 900; }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p id="loader-text" class="mt-4 font-black text-indigo-600 uppercase text-[10px]">Menyimpan Data v82...</p>
    </div>

    <!-- Login -->
    <section id="landing-screen" class="fixed inset-0 z-[3000] flex items-center justify-center bg-[#020617]">
        <div class="p-8 text-center bg-white/5 backdrop-blur-xl rounded-[40px] border border-white/10 w-[90%] max-w-sm">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 uppercase">e-Penguatkuasa <span class="version-box">v82</span></h1>
            <button onclick="loginGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl mt-8 uppercase text-sm">AKSES SISTEM</button>
        </div>
    </section>

    <div id="app-content" class="hidden min-h-screen">
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-8">
                <h2 class="font-black text-slate-800 uppercase text-sm">Borang <span class="version-box">v82</span></h2>
            </div>
            <div class="flex gap-2">
                <button onclick="resetForm()" class="px-3 py-2 bg-slate-100 rounded-lg font-black text-[10px] uppercase">Reset</button>
                <button onclick="toggleProfile()" class="w-8 h-8 rounded-full border overflow-hidden"><img id="navAvatar" src=""></button>
            </div>
        </header>

        <main class="p-4 max-w-7xl mx-auto">
            <form id="mainForm">
                <!-- MAKLUMAT ASAS -->
                <div class="section-card">
                    <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase">A. Maklumat Kes</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                        <div class="col-span-1"><label class="input-label">BIL</label><input type="text" name="BIL" class="form-input-modern uppercase" placeholder="001/2026"></div>
                        <div><label class="input-label">TAHUN</label><input type="number" name="TAHUN" id="f_tahun" class="form-input-modern"></div>
                        <div><label class="input-label">BULAN</label>
                            <select name="BULAN" id="f_bulan" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="col-span-2"><label class="input-label">PEGAWAI</label><input type="text" id="form_staff" name="PENGUATKUASA" class="form-input-modern bg-slate-50 uppercase" readonly></div>
                        <div class="col-span-2"><label class="input-label">KATEGORI KES</label><input type="text" name="KATEGORI_KES" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">NO REPOT POLIS</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern uppercase"></div>
                        <div><label class="input-label">TARIKH</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div><label class="input-label">MASA</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                        <div class="col-span-2"><label class="input-label">LOKASI</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">KESALAHAN</label><input type="text" name="KESALAHAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">UNDANG-UNDANG</label><input type="text" name="UNDANG_UNDANG" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">NO KES IP</label><input type="text" name="NO_KES_IP" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">JENIS RAMPASAN</label><input type="text" name="JENIS_RAMPASAN" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <!-- RAMPASAN HAIWAN HIDUP -->
                <div class="section-card">
                    <h3 class="text-xs font-black text-emerald-600 mb-4 uppercase">B. Haiwan Hidup</h3>
                    <div class="grid-animals">
                        <div><label class="input-label">LEMBU</label><input type="number" name="LEMBU" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KERBAU</label><input type="number" name="KERBAU" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KAMBING</label><input type="number" name="KAMBING" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BEBIRI</label><input type="number" name="BEBIRI" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BABI</label><input type="number" name="BABI" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">AYAM</label><input type="number" name="AYAM" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ANJING</label><input type="number" name="ANJING" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KUCING</label><input type="number" name="KUCING" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ARNAB</label><input type="number" name="ARNAB" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BURUNG</label><input type="number" name="BURUNG" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">HAMSTER</label><input type="number" name="HAMSTER" class="animal-qty form-input-modern" value="0"></div>
                    </div>
                </div>

                <!-- KARKAS / PRODUK -->
                <div class="section-card">
                    <h3 class="text-xs font-black text-amber-600 mb-4 uppercase">C. Karkas & Produk</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                        <div><label class="input-label">KARKAS LEMBU</label><input type="number" name="KARKAS_LEMBU" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS KERBAU</label><input type="number" name="KARKAS_KERBAU" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS KAMBING</label><input type="number" name="KARKAS_KAMBING" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS BABI</label><input type="number" name="KARKAS_BABI" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS AYAM</label><input type="number" name="KARKAS_AYAM" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">K. BABI (SEJUK BEKU)</label><input type="number" name="KARKAS_BABI_SEJUK_BEKU" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ITIK (SEJUK BEKU)</label><input type="number" name="PRODUK_SEJUK_BEKU_ITIK" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BABI (SEJUK BEKU)</label><input type="number" name="PRODUK_SEJUK_BEKU_BABI" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BEBIRI (SEJUK BEKU)</label><input type="number" name="PRODUK_SEJUK_BEKU_BEBIRI" class="animal-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">PRODUK TIN</label><input type="number" name="PRODUK_HAIWAN_TIN" class="animal-qty form-input-modern" value="0"></div>
                        <div class="col-span-2"><label class="input-label">LAIN-LAIN RAMPASAN</label><input type="text" name="RAMPASAN_LAIN" class="form-input-modern uppercase" placeholder="CONTOH: TELUR"></div>
                    </div>
                </div>

                <!-- NILAI & RINGKASAN -->
                <div class="section-card border-l-8 border-indigo-600">
                    <h3 class="text-xs font-black text-slate-800 mb-4 uppercase">D. Nilai & Ringkasan</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="col-span-2"><label class="input-label">JUMLAH RAMPASAN (EKOR/KG/UNIT)</label><input type="text" name="JUMLAH_RAMPASAN" id="total_qty" class="form-input-modern bg-indigo-50" readonly value="0"></div>
                        <div class="col-span-2"><label class="input-label">PENGANGKUTAN (JENIS/NO PLAT)</label><input type="text" name="RAMPASAN_PENGANGKUTAN" class="form-input-modern uppercase"></div>
                        
                        <div><label class="input-label">NILAI EKOR/KG (RM)</label><input type="number" name="ANGGARAN_NILAI_EKOR_KG" class="val-calc form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI KENDERAAN (RM)</label><input type="number" name="ANGGARAN_NILAI_KENDERAAN" class="val-calc form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI PENGANGKUT/KONTENA (RM)</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="val-calc form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI LAIN-LAIN (RM)</label><input type="number" name="ANGGARAN_NILAI_LAIN_LAIN" class="val-calc form-input-modern" value="0"></div>
                        
                        <div class="col-span-2"><label class="input-label">JUMLAH NILAI KESELURUHAN</label><input type="text" name="JUMLAH_NILAI_KESELURUHAN" id="total_rm" class="form-input-modern font-black text-indigo-700 text-xl" readonly value="RM 0.00"></div>
                        <div class="col-span-2"><label class="input-label">KES SERAHAN</label><input type="text" name="KES_SERAHAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-4"><label class="input-label">CATATAN</label><input type="text" name="CATATAN" class="form-input-modern uppercase"></div>
                    </div>
                    
                    <button type="button" onclick="submitData()" class="premium-gold-btn w-full py-4 rounded-2xl mt-8 uppercase shadow-xl active:scale-95 transition">Simpan Rekod v82</button>
                </div>
            </form>
        </main>
    </div>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all p-8">
        <div class="flex justify-between mb-8">
            <h2 class="font-black">PROFIL</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="input-label">Nama</label><input type="text" id="p_name" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred</label><input type="text" id="p_gred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Cawangan</label><input type="text" id="p_caw" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase">Update</button>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs mt-4">LOG KELUAR</button>
        </div>
    </aside>

    <script>
        const SCRIPT_URL = 'URL_APPS_SCRhttps://script.google.com/macros/s/AKfycbyGxw2QFICjKh6MplU8LcTT5Xye9xXqRadA5E6lzb6hPE9PNSQ-32qaEnlIV_YouZ_R/execIPT_ANDA'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        // AUTH
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                loadProfile(user);
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.data() || {};
            document.getElementById('navAvatar').src = user.photoURL;
            document.getElementById('p_name').value = d.name || '';
            document.getElementById('p_gred').value = d.gred || '';
            document.getElementById('p_caw').value = d.cawangan || '';
            if(d.name) document.getElementById('form_staff').value = `${d.name} (${d.gred}) / ${d.cawangan}`.toUpperCase();
        }

        function toggleProfile() {
            const s = document.getElementById('profileSidebar');
            s.style.right = s.style.right === '0px' ? '-100%' : '0px';
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            await db.collection("users").doc(user.uid).set({
                name: document.getElementById('p_name').value.toUpperCase(),
                gred: document.getElementById('p_gred').value.toUpperCase(),
                cawangan: document.getElementById('p_caw').value.toUpperCase()
            }, {merge:true});
            alert("Profil dikemaskini");
            location.reload();
        }

        // CALCULATIONS
        document.addEventListener('input', e => {
            if(e.target.classList.contains('animal-qty')) {
                let total = 0;
                document.querySelectorAll('.animal-qty').forEach(i => total += Number(i.value || 0));
                document.getElementById('total_qty').value = total;
            }
            if(e.target.classList.contains('val-calc')) {
                let totalRM = 0;
                document.querySelectorAll('.val-calc').forEach(i => totalRM += Number(i.value || 0));
                document.getElementById('total_rm').value = "RM " + totalRM.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });

        // SUBMISSION
        async function submitData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            const formData = new FormData(document.getElementById('mainForm'));
            const data = Object.fromEntries(formData.entries());
            data.userID = firebase.auth().currentUser.uid;
            data.timestamp = new Date().toISOString();

            try {
                // 1. Firestore
                await db.collection("reports").add(data);
                
                // 2. Spreadsheet
                if(SCRIPT_URL !== 'URL_APPS_SCRIPThttps://script.google.com/macros/s/AKfycbyGxw2QFICjKh6MplU8LcTT5Xye9xXqRadA5E6lzb6hPE9PNSQ-32qaEnlIV_YouZ_R/exec_ANDA') {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }

                // 3. Baserow
                await fetch(`https://api.baserow.io/api/database/rows/table/${BASEROW_TABLE_ID}/?user_field_names=true`, {
                    method: 'POST',
                    headers: { 'Authorization': `Token ${BASEROW_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "BIL": data.BIL,
                        "TAHUN": Number(data.TAHUN),
                        "BULAN": data.BULAN,
                        "PEGAWAI": data.PENGUATKUASA,
                        "KATEGORI": data.KATEGORI_KES,
                        "JUMLAH_NILAI": data.JUMLAH_NILAI_KESELURUHAN
                    })
                });

                alert("DATA BERJAYA DISIMPAN KE SEMUA PLATFORM!");
                resetForm();
            } catch (e) {
                alert("Ralat: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('f_tahun').value = new Date().getFullYear();
            document.getElementById('total_rm').value = "RM 0.00";
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        document.getElementById('f_tahun').value = new Date().getFullYear();

    </script>
</body>
</html>
