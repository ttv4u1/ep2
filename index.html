<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Penguatkuasa v73 - Pro Edition</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9; color: #0f172a; 
            font-size: 16px;
        }

        /* ANIMATED COLORFUL VERSION */
        @keyframes rainbowText {
            0% { color: #ff0000; }
            20% { color: #ff8800; }
            40% { color: #ffff00; }
            60% { color: #00ff00; }
            80% { color: #0088ff; }
            100% { color: #ff00ff; }
        }
        .version-v73 {
            font-weight: 900;
            animation: rainbowText 3s infinite alternate;
            text-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .section-card {
            background: white; border-radius: 20px; padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 2rem;
        }
        .input-label {
            font-size: 13px; font-weight: 800; text-transform: uppercase; color: #334155; 
            margin-bottom: 8px; display: block; letter-spacing: 0.05em;
        }
        .form-input-modern {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 16px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .animal-grid-item { background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }

        /* PRINT OPTIMIZATION v73 */
        @media print {
            @page { size: A4; margin: 0.5cm; }
            body { background: white !important; font-size: 8.5pt !important; color: black !important; }
            .no-print { display: none !important; }
            .section-card { 
                box-shadow: none !important; border: 1px solid #000 !important; 
                padding: 8px !important; margin-bottom: 8px !important; border-radius: 10px !important;
            }
            .form-input-modern { 
                border: none !important; border-bottom: 1px solid #ccc !important; 
                padding: 1px !important; font-size: 9pt !important;
            }
            .grid-cols-12 { grid-template-columns: repeat(4, 1fr) !important; }
            .print-only-header { display: flex !important; align-items: center; justify-content: center; gap: 15px; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 10px; }
            .print-only-header img { height: 40px; }
            .print-only-header h1 { font-size: 12pt; font-weight: 900; }
        }
        .print-only-header { display: none; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>

                        <div class="bg-indigo-50 p-3 rounded-2xl"><label class="input-label">40. Nilai (Kontena)</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="calc form-input-modern" value="0"></div>

    <!-- DATABASE SIDEBAR -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-[500px] h-full bg-slate-50 z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto no-print p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase">REKOD DATABASE <span class="version-v73">v73</span></h2>
            <button onclick="toggleHistory()"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="space-y-4"></div>
    </aside>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-[400px] h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl uppercase">Profil Pegawai</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="input-label">Nama Penuh</label><input type="text" id="userName" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred Jabatan</label><input type="text" id="userGred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Cawangan</label><input type="text" id="userCawangan" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase">Kemaskini</button>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-4">Log Keluar</button>
        </div>
    </aside>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let currentUser = null;

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => { document.getElementById('app-content').classList.add('opacity-100'); }, 50);
                loadProfile(user);
                resetForm();
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            const isOpen = s.style.left === '0px';
            s.style.left = isOpen ? '-100%' : '0px'; 
            if(!isOpen) fetchHistory();
        }
        function toggleProfile() { const s = document.getElementById('profileSidebar'); s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('currentDocId').value = "";
            const now = new Date();
            document.getElementById('f_tahun').value = now.getFullYear();
            const months = ["JANUARI","FEBRUARI","MAC","APRIL","MEI","JUN","JULAI","OGOS","SEPTEMBER","OKTOBER","NOVEMBER","DISEMBER"];
            document.getElementById('f_bulan').value = months[now.getMonth()];
            calcTotal();
        }

        function calcTotal() {
            let sum = 0;
            document.querySelectorAll('.calc').forEach(i => sum += Number(i.value || 0));
            document.getElementById('total_val_web').value = "RM " + sum.toLocaleString('en-MY', {minimumFractionDigits: 2});
        }
        document.getElementById('mainForm').addEventListener('input', calcTotal);

        async function saveToFirebase() {
            if(!currentUser) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                const formData = new FormData(document.getElementById('mainForm'));
                const data = Object.fromEntries(formData.entries());
                Object.keys(data).forEach(k => { if(typeof data[k] === 'string') data[k] = data[k].toUpperCase(); });
                
                data.userId = currentUser.uid;
                data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                
                const docId = document.getElementById('currentDocId').value;
                if(docId) await db.collection("reports").doc(docId).set(data, {merge: true});
                else await db.collection("reports").add(data);
                
                alert("Rekod v73 Berjaya!");
                resetForm();
            } catch (e) { alert("Ralat: " + e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function fetchHistory() {
            const listDiv = document.getElementById('historyList');
            listDiv.innerHTML = '<p class="text-center py-10 animate-pulse text-xs font-bold uppercase">Memuatkan Rekod...</p>';
            
            try {
                const snapshot = await db.collection("reports").where("userId", "==", currentUser.uid).get();
                let docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                
                docs.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));

                listDiv.innerHTML = "";
                if(docs.length === 0) { listDiv.innerHTML = '<p class="text-center py-10 text-xs">Tiada Data</p>'; return; }

                docs.forEach(d => {
                    // Format Timestamp Save
                    const saveTime = d.updatedAt ? new Date(d.updatedAt.seconds * 1000).toLocaleString('ms-MY') : '-';
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-2xl border-l-8 border-indigo-600 shadow-sm hover:shadow-md cursor-pointer transition";
                    card.onclick = () => {
                        document.getElementById('currentDocId').value = d.id;
                        Object.keys(d).forEach(key => {
                            const input = document.querySelector(`[name="${key}"]`);
                            if (input) input.value = d[key];
                        });
                        calcTotal();
                        toggleHistory();
                    };
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-2 py-1 rounded">BIL: ${d.BIL || '00'}</span>
                            <span class="text-emerald-600 font-black text-sm">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0.00'}</span>
                        </div>
                        <h4 class="font-black text-slate-800 uppercase text-xs truncate mb-1">${d.KATEGORI_KES || 'Kategori'}</h4>
                        <div class="grid grid-cols-1 gap-1 text-[10px] font-bold text-slate-500 uppercase">
                            <div class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> ${d.PENGUATKUASA || 'N/A'}</div>
                            <div class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> KEJADIAN: ${d.TARIKH_KEJADIAN || '-'} | ${d.MASA_KEJADIAN || ''}</div>
                            <div class="mt-2 pt-2 border-t border-slate-100 text-indigo-400 italic">
                                <i data-lucide="clock" class="w-3 h-3 inline"></i> Disimpan Pada: ${saveTime}
                            </div>
                        </div>
                    `;
                    listDiv.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { listDiv.innerHTML = `<p class="text-red-500 text-[10px]">Ralat: ${e.message}</p>`; }
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.exists ? doc.data() : {};
            const name = d.name || user.displayName || 'PEGAWAI';
            document.getElementById('navName').innerText = name;
            document.getElementById('navAvatar').src = user.photoURL || "https://ui-avatars.com/api/?name="+name;
            document.getElementById('userName').value = name;
            document.getElementById('userGred').value = d.gred || '';
            document.getElementById('userCawangan').value = d.cawangan || '';
            document.getElementById('form_staff').value = `${name} (${d.gred || ''}) / ${d.cawangan || ''}`.toUpperCase();
        }

        async function saveProfile() {
            await db.collection("users").doc(currentUser.uid).set({
                name: document.getElementById('userName').value.toUpperCase(),
                gred: document.getElementById('userGred').value.toUpperCase(),
                cawangan: document.getElementById('userCawangan').value.toUpperCase()
            }, { merge: true });
            alert("Profil Dikemaskini!");
            location.reload();
        }

        function exportToExcel() {
            const fd = new FormData(document.getElementById('mainForm'));
            const turutan = ["BIL", "TAHUN", "BULAN", "PENGUATKUASA", "KATEGORI_KES", "NO_REPOT_POLIS", "TARIKH_KEJADIAN", "MASA_KEJADIAN", "LOKASI_KEJADIAN", "KESALAHAN", "UNDANG_UNDANG", "NO_KES_IP", "JENIS_RAMPASAN", "LEMBU", "KERBAU", "KAMBING", "BEBIRI", "BABI", "AYAM", "KARKAS_LEMBU", "KARKAS_KERBAU", "KARKAS_KAMBING", "KARKAS_BABI", "KARKAS_BABI_SEJUK_BEKU", "KARKAS_AYAM", "PRODUK_SEJUK_BEKU_ITIK", "PRODUK_SEJUK_BEKU_AYAM", "PRODUK_SEJUK_BEKU_BABI", "PRODUK_HAIWAN_TIN", "ANJING", "KUCING", "ARNAB", "BURUNG", "HAMSTER", "RAMPASAN_LAIN_LAIN", "JUMLAH_RAMPASAN_KENDERAAN", "RAMPASAN_PENGANGKUTAN", "ANGGARAN_NILAI_EKOR_KG", "ANGGARAN_NILAI_KENDERAAN", "ANGGARAN_NILAI_PENGANGKUT_KONTENA", "ANGGARAN_NILAI_LAIN_LAIN", "JUMLAH_NILAI_KESELURUHAN", "KES_SERAHAN", "CATATAN"];
            const row = {};
            turutan.forEach(k => row[k] = fd.get(k) || (k === "JUMLAH_NILAI_KESELURUHAN" ? document.getElementById('total_val_web').value : ""));
            const ws = XLSX.utils.json_to_sheet([row]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_v73_${fd.get("BIL")}.xlsx`);
        }

        function printReport() { window.print(); }
        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
