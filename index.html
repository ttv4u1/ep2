<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Penguatkuasa v14 | Cloud & Export Mode</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Excel & CSV Export Library -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc; color: #0f172a; 
            font-size: 13px; /* Dikecilkan untuk compact view */
        }
        .master-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40%; opacity: 0.03; z-index: -1; pointer-events: none;
        }
        #landing-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center; background: #0f172a;
        }
        .section-card {
            background: white; border-radius: 8px; padding: 1rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 0.75rem;
        }
        .input-label {
            font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 2px; display: block;
        }
        .form-input-modern {
            width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 13px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .animal-item { background: #f1f5f9; padding: 6px; border-radius: 6px; border: 1px solid #e2e8f0; }
        
        .grid-rampasan-auto { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 8px; 
        }

        .avatar-option {
            cursor: pointer; border: 3px solid transparent; transition: 0.2s; border-radius: 50%;
        }
        .avatar-option.selected { border-color: #4f46e5; transform: scale(1.1); }
        
        @media print { 
            @page { size: A4; margin: 0.5cm; }
            .no-print { display: none !important; } 
            body { background: white !important; font-size: 10pt !important; }
            .section-card { border: 1px solid #000 !important; padding: 8px !important; margin-bottom: 8px !important; break-inside: avoid; }
            .form-input-modern { border: none !important; border-bottom: 1px solid #000 !important; padding: 0 !important; font-size: 10pt !important; }
            .input-label { color: #000 !important; font-size: 8pt !important; }
            #total_val { color: black !important; font-size: 18pt !important; font-weight: bold !important; }
            .grid-rampasan-auto { grid-template-columns: repeat(6, 1fr) !important; }
            .animal-item { background: none !important; border: none !important; }
            .master-bg { display: none; }
        }
    </style>
</head>
<body class="antialiased">

    <img src="https://www.akm.gov.my/images/madani/JATA%20NEGARA%20AI-01.png" class="master-bg">

    <!-- LANDING SCREEN -->
    <section id="landing-screen">
        <div class="p-8 text-center bg-white/10 backdrop-blur-xl rounded-[40px] border border-white/20 w-[90%] max-w-md">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-24 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 tracking-tighter">e-Penguatkuasa v14</h1>
            <p class="text-indigo-300 text-[10px] font-bold tracking-[0.3em] mb-10 uppercase">Sistem Laporan Bersepadu</p>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 font-black py-3 rounded-2xl hover:bg-indigo-50 transition active:scale-95 shadow-2xl">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5"> LOG MASUK GOOGLE
            </button>
        </div>
    </section>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700 min-h-screen">
        
        <header class="sticky top-0 z-40 bg-white border-b border-slate-200 no-print shadow-sm">
            <div class="w-full px-4 py-2 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-10">
                    <div>
                        <h2 class="text-sm font-black text-slate-800 uppercase leading-none">Laporan Kes Penguatkuasaan v14</h2>
                        <span class="text-[9px] font-bold text-indigo-600 uppercase">Single Page A4 Ready</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex gap-1">
                        <button onclick="exportData('xlsx')" class="p-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition" title="Export Excel"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i></button>
                        <button onclick="exportData('csv')" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition" title="Export CSV"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                    </div>
                    <button onclick="printReport()" class="flex items-center gap-2 px-3 py-2 bg-slate-800 text-white rounded-lg hover:bg-black transition text-[11px] font-bold uppercase shadow-md">
                        <i data-lucide="printer" class="w-4 h-4"></i> Cetak
                    </button>
                    <button onclick="toggleProfile()" class="flex items-center gap-2 bg-slate-100 p-1 pr-3 rounded-full hover:bg-slate-200 transition border">
                        <img id="navAvatar" src="https://ui-avatars.com/api/?name=User" class="w-7 h-7 rounded-full object-cover">
                        <span class="text-[10px] font-bold uppercase" id="navName">User</span>
                    </button>
                    <button onclick="logout()" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </header>

        <main class="w-full px-4 py-3">
            <form id="mainForm">
                
                <!-- MAKLUMAT ASAS -->
                <div class="section-card">
                    <div class="grid grid-cols-2 md:grid-cols-6 lg:grid-cols-12 gap-2">
                        <div class="lg:col-span-1"><label class="input-label">Bil</label><input type="text" name="BIL" class="form-input-modern"></div>
                        <div class="lg:col-span-1"><label class="input-label">Tahun</label><input type="number" name="TAHUN" class="form-input-modern" value="2026"></div>
                        <div class="lg:col-span-2"><label class="input-label">Bulan</label>
                            <select name="BULAN" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="lg:col-span-3"><label class="input-label">Penguatkuasa</label><input type="text" name="PENGUATKUASA" id="form_staff" class="form-input-modern bg-slate-50" readonly></div>
                        <div class="lg:col-span-2"><label class="input-label">Kategori Kes</label><input type="text" name="KATEGORI_KES" class="form-input-modern"></div>
                        <div class="lg:col-span-3"><label class="input-label">No Repot Polis</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern"></div>
                    </div>
                </div>

                <!-- KEJADIAN -->
                <div class="section-card">
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-10 gap-2">
                        <div class="lg:col-span-2"><label class="input-label">Tarikh Kejadian</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div class="lg:col-span-1"><label class="input-label">Masa</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                        <div class="lg:col-span-2"><label class="input-label">Lokasi Kejadian</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern"></div>
                        <div class="lg:col-span-2"><label class="input-label">No Kes IP</label><input type="text" name="NO_KES_IP" class="form-input-modern"></div>
                        <div class="lg:col-span-3"><label class="input-label">Kesalahan</label><input type="text" name="KESALAHAN" class="form-input-modern"></div>
                        <div class="lg:col-span-10"><label class="input-label">Undang-Undang</label><input type="text" name="UNDANG_UNDANG" class="form-input-modern"></div>
                    </div>
                </div>

                <!-- RAMPASAN -->
                <div class="section-card">
                    <div class="mb-2">
                        <label class="input-label">Jenis Rampasan (Keterangan)</label>
                        <input type="text" name="JENIS_RAMPASAN" class="form-input-modern" placeholder="Cth: Haiwan Hidup">
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                        <!-- Haiwan Hidup -->
                        <div class="lg:col-span-1">
                            <p class="text-[9px] font-black text-indigo-500 mb-1">HAIWAN HIDUP (EKOR)</p>
                            <div class="grid grid-cols-3 gap-1">
                                <div class="animal-item"><label class="input-label">Lembu</label><input type="number" name="LEMBU" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Kerbau</label><input type="number" name="KERBAU" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Kambing</label><input type="number" name="KAMBING" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Bebiri</label><input type="number" name="BEBIRI" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Babi</label><input type="number" name="BABI" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Ayam</label><input type="number" name="AYAM" class="form-input-modern p-1" value="0"></div>
                            </div>
                        </div>
                        <!-- Karkas -->
                        <div class="lg:col-span-1">
                            <p class="text-[9px] font-black text-indigo-500 mb-1">KARKAS (KG)</p>
                            <div class="grid grid-cols-3 gap-1">
                                <div class="animal-item"><label class="input-label">K.Lembu</label><input type="number" name="KARKAS_LEMBU" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">K.Kerbau</label><input type="number" name="KARKAS_KERBAU" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">K.Kambing</label><input type="number" name="KARKAS_KAMBING" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">K.Babi</label><input type="number" name="KARKAS_BABI" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">K.Babi SB</label><input type="number" name="KARKAS_BABI_SEJUK_BEKU" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">K.Ayam</label><input type="number" name="KARKAS_AYAM" class="form-input-modern p-1" value="0"></div>
                            </div>
                        </div>
                        <!-- Produk -->
                        <div class="lg:col-span-1">
                            <p class="text-[9px] font-black text-indigo-500 mb-1">PRODUK SB/TIN</p>
                            <div class="grid grid-cols-2 gap-1">
                                <div class="animal-item"><label class="input-label">SB Itik</label><input type="number" name="PRODUK_SEJUK_BEKU_ITIK" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">SB Ayam</label><input type="number" name="PRODUK_SEJUK_BEKU_AYAM" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">SB Babi</label><input type="number" name="PRODUK_SEJUK_BEKU_BABI" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Haiwan Tin</label><input type="number" name="PRODUK_HAIWAN_TIN" class="form-input-modern p-1" value="0"></div>
                            </div>
                        </div>
                        <!-- Kesayangan -->
                        <div class="lg:col-span-1">
                            <p class="text-[9px] font-black text-indigo-500 mb-1">LAIN-LAIN / PET</p>
                            <div class="grid grid-cols-3 gap-1">
                                <div class="animal-item"><label class="input-label">Anjing</label><input type="number" name="ANJING" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Kucing</label><input type="number" name="KUCING" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Arnab</label><input type="number" name="ARNAB" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Burung</label><input type="number" name="BURUNG" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Hamster</label><input type="number" name="HAMSTER" class="form-input-modern p-1" value="0"></div>
                                <div class="animal-item"><label class="input-label">Lain2</label><input type="number" name="RAMPASAN_LAIN_LAIN" class="form-input-modern p-1" value="0"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- LOGISTIK & NILAI -->
                <div class="section-card border-l-[6px] border-indigo-600">
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                        <div><label class="input-label">Bil Kenderaan</label><input type="number" name="JUMLAH_RAMPASAN_KENDERAAN" class="form-input-modern" value="0"></div>
                        <div class="lg:col-span-1"><label class="input-label">Pengangkut/Kontena</label><input type="text" name="RAMPASAN_PENGANGKUT_KONTENA" class="form-input-modern" placeholder="Lori/Kontena"></div>
                        <div><label class="input-label">Nilai Ekor/KG (RM)</label><input type="number" name="ANGGARAN_NILAI_EKOR_KG" class="calc form-input-modern" value="0" step="0.01"></div>
                        <div><label class="input-label">Nilai Kenderaan (RM)</label><input type="number" name="ANGGARAN_NILAI_KENDERAAN" class="calc form-input-modern" value="0" step="0.01"></div>
                        <div><label class="input-label">Nilai Pengangkut (RM)</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="calc form-input-modern" value="0" step="0.01"></div>
                        <div><label class="input-label">Nilai Lain-Lain (RM)</label><input type="number" name="ANGGARAN_NILAI_LAIN_LAIN" class="calc form-input-modern" value="0" step="0.01"></div>
                    </div>
                    
                    <div class="mt-3 bg-slate-900 rounded-lg p-3 text-white flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Jumlah Keseluruhan</span>
                        <input type="text" name="JUMLAH_NILAI_KESELURUHAN" id="total_val" readonly class="bg-transparent text-right font-black text-2xl outline-none text-white w-1/2" value="RM 0.00">
                    </div>
                </div>

                <!-- SERAHAN -->
                <div class="section-card">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="input-label">Kes Serahan</label><input type="text" name="KES_SERAHAN" class="form-input-modern"></div>
                        <div><label class="input-label">Catatan</label><input type="text" name="CATATAN" class="form-input-modern"></div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-[350px] h-full bg-white z-[1001] shadow-2xl transition-all duration-500 overflow-y-auto no-print">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-lg text-slate-900 uppercase">Profil Pegawai</h2>
                <button onclick="toggleProfile()" class="p-1 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5 text-slate-600"></i></button>
            </div>
            
            <div class="text-center mb-6">
                <div class="relative inline-block group">
                    <img id="sideAvatar" src="https://ui-avatars.com/api/?name=User" class="w-24 h-24 mx-auto rounded-full border-4 border-indigo-50 shadow-md object-cover">
                    <label for="uploadImg" class="absolute bottom-0 right-0 p-2 bg-indigo-600 rounded-full text-white cursor-pointer hover:bg-indigo-700 shadow-lg">
                        <i data-lucide="camera" class="w-4 h-4"></i>
                        <input type="file" id="uploadImg" class="hidden" accept="image/*" onchange="previewImage(this)">
                    </label>
                </div>
                <p class="text-[10px] mt-2 text-slate-400">Klik kamera untuk muat naik</p>
            </div>

            <div class="mb-6">
                <label class="input-label mb-2">Atau Pilih Avatar:</label>
                <div class="grid grid-cols-4 gap-2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-option w-10 h-10 bg-slate-100" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-option w-10 h-10 bg-slate-100" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jace" class="avatar-option w-10 h-10 bg-slate-100" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Patches" class="avatar-option w-10 h-10 bg-slate-100" onclick="selectAvatar(this.src)">
                </div>
            </div>

            <div class="space-y-3">
                <div><label class="input-label">Nama Penuh</label><input type="text" id="userName" class="form-input-modern uppercase"></div>
                <div><label class="input-label">Gred Jawatan</label><input type="text" id="userGred" class="form-input-modern uppercase" placeholder="G29"></div>
                <div><label class="input-label">Cawangan</label><input type="text" id="userCawangan" class="form-input-modern uppercase"></div>
                <button onclick="saveProfile()" class="w-full mt-4 bg-slate-900 text-white font-black py-3 rounded-xl shadow-lg hover:bg-slate-800 transition uppercase text-xs">Simpan Profil</button>
            </div>
        </div>
    </aside>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let currentAvatarUrl = "";

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('app-content').classList.add('opacity-100'), 50);
                loadProfile(user);
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
            }
        });

        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm('Log keluar?')) firebase.auth().signOut().then(() => location.reload()); }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            let data = doc.exists ? doc.data() : {};
            const name = data.name || user.displayName || 'PEGAWAI';
            const gred = data.gred || '';
            const cawangan = data.cawangan || '';
            currentAvatarUrl = data.avatar || `https://ui-avatars.com/api/?name=${name}`;

            document.getElementById('navName').innerText = name;
            document.getElementById('navAvatar').src = currentAvatarUrl;
            document.getElementById('sideAvatar').src = currentAvatarUrl;
            document.getElementById('userName').value = name;
            document.getElementById('userGred').value = gred;
            document.getElementById('userCawangan').value = cawangan;
            document.getElementById('form_staff').value = `${name} (${gred}) / ${cawangan}`.toUpperCase();
        }

        function selectAvatar(url) {
            currentAvatarUrl = url;
            document.getElementById('sideAvatar').src = url;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentAvatarUrl = e.target.result;
                    document.getElementById('sideAvatar').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const profileData = {
                name: document.getElementById('userName').value,
                gred: document.getElementById('userGred').value,
                cawangan: document.getElementById('userCawangan').value,
                avatar: currentAvatarUrl,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection("users").doc(user.uid).set(profileData, { merge: true });
            alert("Profil dikemaskini!");
            location.reload();
        }

        function toggleProfile() {
            const s = document.getElementById('profileSidebar');
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px';
        }

        function calcTotal() {
            let sum = 0;
            document.querySelectorAll('.calc').forEach(i => sum += Number(i.value || 0));
            document.getElementById('total_val').value = "RM " + sum.toLocaleString('en-MY', {minimumFractionDigits: 2});
        }
        document.querySelectorAll('.calc').forEach(i => i.addEventListener('input', calcTotal));

        function printReport() { window.print(); }

        function exportData(type) {
            const form = document.getElementById('mainForm');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => data[key] = value);
            data['JUMLAH_NILAI_KESELURUHAN'] = document.getElementById('total_val').value;

            const worksheet = XLSX.utils.json_to_sheet([data]);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "LaporanKes");

            if (type === 'xlsx') {
                XLSX.writeFile(workbook, `Laporan_Kes_${data.BIL || 'Baru'}.xlsx`);
            } else {
                XLSX.writeFile(workbook, `Laporan_Kes_${data.BIL || 'Baru'}.csv`, { bookType: 'csv' });
            }
        }
    </script>
</body>
