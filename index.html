    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRole = 'USER';

        // 44 KOLUM MAPPING (Clean Key for DB vs Header for External)
        const MASTER_COLUMNS = [
            { id: 'BIL', header: 'BIL' },
            { id: 'TAHUN', header: 'TAHUN' },
            { id: 'BULAN', header: 'BULAN' },
            { id: 'PENGUATKUASA', header: 'PENGUATKUASA' },
            { id: 'KATEGORI_KES', header: 'KATEGORI KES' },
            { id: 'NO_REPOT_POLIS', header: 'NO REPOT POLIS' },
            { id: 'TARIKH_KEJADIAN', header: 'TARIKH KEJADIAN' },
            { id: 'MASA_KEJADIAN', header: 'MASA KEJADIAN' },
            { id: 'LOKASI_KEJADIAN', header: 'LOKASI KEJADIAN' },
            { id: 'KESALAHAN', header: 'KESALAHAN' },
            { id: 'UNDANG_UNDANG', header: 'UNDANG-UNDANG' },
            { id: 'NO_KES_IP', header: 'NO KES IP' },
            { id: 'JENIS_RAMPASAN', header: 'JENIS RAMPASAN' },
            { id: 'LEMBU', header: 'LEMBU' },
            { id: 'KERBAU', header: 'KERBAU' },
            { id: 'KAMBING', header: 'KAMBING' },
            { id: 'BEBIRI', header: 'BEBIRI' },
            { id: 'BABI', header: 'BABI' },
            { id: 'AYAM', header: 'AYAM' },
            { id: 'KARKAS_LEMBU', header: 'KARKAS LEMBU' },
            { id: 'KARKAS_KERBAU', header: 'KARKAS KERBAU' },
            { id: 'KARKAS_KAMBING', header: 'KARKAS KAMBING' },
            { id: 'KARKAS_BABI', header: 'KARKAS BABI' },
            { id: 'KARKAS_BABI_SEJUK_BEKU', header: 'KARKAS BABI SEJUK BEKU' },
            { id: 'KARKAS_AYAM', header: 'KARKAS AYAM' },
            { id: 'PRODUK_SEJUK_BEKU_ITIK', header: 'PRODUK SEJUK BEKU ITIK' },
            { id: 'PRODUK_SEJUK_BEKU_AYAM', header: 'PRODUK SEJUK BEKU AYAM' },

            { id: 'PRODUK_HAIWAN_TIN', header: 'PRODUK HAIWAN (TIN)' },
            { id: 'ANJING', header: 'ANJING' },
            { id: 'KUCING', header: 'KUCING' },
            { id: 'ARNAB', header: 'ARNAB' },
            { id: 'BURUNG', header: 'BURUNG' },
            { id: 'HAMSTER', header: 'HAMSTER' },
            { id: 'RAMPASAN_LAIN_LAIN', header: 'RAMPASAN LAIN-LAIN' },
            { id: 'JUMLAH_RAMPASAN_KENDERAAN', header: 'JUMLAH RAMPASAN KENDERAAN' },
            { id: 'RAMPASAN_PENGANGKUTAN', header: 'RAMPASAN PENGANGKUTAN' },
            { id: 'ANGGARAN_NILAI_EKOR_KG', header: 'ANGGARAN NILAI (EKOR/KG)' },
            { id: 'ANGGARAN_NILAI_KENDERAAN', header: 'ANGGARAN NILAI (KENDERAAN)' },
            { id: 'ANGGARAN_NILAI_PENGANGKUT_KONTENA', header: 'ANGGARAN NILAI (PENGANGKUT/KONTENA)' },

            { id: 'CATATAN', header: 'CATATAN' }
        ];

        // --- AUTH & PROFILE ---
        firebase.auth().onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('navAvatar').src = user.photoURL;
                document.getElementById('landing-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                if(['ttv4u1@gmail.com', 'roland@dvs.gov.my'].includes(user.email)) {
                    userRole = 'ADMIN';
                    document.getElementById('superAdminBadge').classList.remove('hidden');
                }
                await loadProfile(user);
                lucide.createIcons();
            } else {
                document.getElementById('landing-screen').classList.remove('hidden');
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
        }

        async function loadProfile(u) {
            try {
                const doc = await db.collection("users").doc(u.uid).get();
                const d = doc.data() || {};
                document.getElementById('p_name').value = d.name || u.displayName || "";
                document.getElementById('p_caw').value = d.cawangan || "";
                if(d.name) document.getElementById('f_staff').value = `${d.name} / ${d.cawangan}`.toUpperCase();
            } catch(e) { console.warn("Waiting profile doc..."); }
        }

        async function saveProfile() {
            const u = firebase.auth().currentUser;
            await db.collection("users").doc(u.uid).set({
                name: document.getElementById('p_name').value.toUpperCase(),
                cawangan: document.getElementById('p_caw').value.toUpperCase()
            }, {merge:true});
            alert("Profil dikemaskini!"); location.reload();
        }

        // --- AUTOCALCULATE ---
        function runCalc() {
            const keys = ['ANGGARAN_NILAI_EKOR_KG', 'ANGGARAN_NILAI_KENDERAAN', 'ANGGARAN_NILAI_PENGANGKUT_KONTENA', 'ANGGARAN_NILAI_LAIN_LAIN'];
            let total = 0;
            keys.forEach(k => {
                const input = document.getElementsByName(k)[0];
                if(input) total += parseFloat(input.value) || 0;
            });
            document.getElementById('disp_total').value = "RM " + total.toLocaleString('en-US', {minimumFractionDigits:2});
        }
        document.addEventListener('input', e => { if(e.target.classList.contains('calc-field')) runCalc(); });

        // --- SUBMISSION ---
        async function submitData() {
            const loader = document.getElementById('loader'); loader.style.display = 'flex';
            const formData = new FormData(document.getElementById('mainForm'));
            const dataRaw = Object.fromEntries(formData.entries());
            const docId = document.getElementById('currentDocId').value;
            const source = document.getElementById('currentSource').value;

            runCalc();
            dataRaw.JUMLAH_NILAI_KESELURUHAN = document.getElementById('disp_total').value;

            // Bina Data Payload
            const dbPayload = {}; // Untuk Firestore
            const syncPayload = {}; // Untuk Spreadsheet/Baserow

            MASTER_COLUMNS.forEach(col => {
                const val = dataRaw[col.id] || "";
                dbPayload[col.id] = val;
                syncPayload[col.header] = val;
            });

            try {
                if(docId) {
                    await db.collection(source).doc(docId).update(dbPayload);
                    alert(`Rekod dalam ${source.toUpperCase()} telah dikemaskini!`);
                } else {
                    dbPayload.timestamp = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("reports").add(dbPayload);
                    alert("Rekod BARU telah disimpan ke Database Global!");
                }

                // External Real-time Sync
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(syncPayload) });
                try {
                    await fetch(`https://api.baserow.io/api/database/rows/table/${BASEROW_TABLE_ID}/?user_field_names=true`, {
                        method: 'POST',
                        headers: { 'Authorization': `Token ${BASEROW_TOKEN}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(syncPayload)
                    });
                } catch(e) {}

                resetForm();
            } catch (e) { alert("Ralat Database: " + e.message); }
            finally { loader.style.display = 'none'; }
        }

        // --- HISTORY & EDITING ---
        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="p-20 text-center animate-pulse font-black uppercase text-xs tracking-widest text-indigo-600">Menghubungkan Master Database...</div>';
            try {
                const [live, excel] = await Promise.all([
                    db.collection("reports").orderBy("timestamp", "desc").limit(30).get(),
                    db.collection("kes_penguatkuasaan").limit(30).get()
                ]);

                list.innerHTML = '';
                const render = (doc, src) => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border-2 border-transparent hover:border-indigo-500 transition-all cursor-pointer group shadow-sm hover:shadow-xl relative";
                    
                    let del = (userRole === 'ADMIN') ? `<button onclick="event.stopPropagation(); deleteRec('${doc.id}', '${src}')" class="absolute top-4 right-4 text-rose-400 p-2 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2"></i></button>` : '';

                    card.innerHTML = `
                        <div onclick="editRec('${doc.id}', '${src}')">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[10px] font-black px-3 py-1 rounded-full bg-slate-100 text-slate-500">#${d.BIL || '-'}</span>
                                <span class="text-[10px] font-black uppercase ${src === 'reports' ? 'text-indigo-600 bg-indigo-50' : 'text-emerald-600 bg-emerald-50'} px-3 py-1 rounded-full">${src.toUpperCase()}</span>
                            </div>
                            <h4 class="font-extrabold text-base uppercase leading-tight text-slate-800 pr-10 line-clamp-2">${d.KESALAHAN || d['KESALAHAN'] || 'TIADA MAKLUMAT'}</h4>
                            <div class="flex justify-between mt-6 items-end">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${d.PENGUATKUASA || d['PENGUATKUASA'] || 'STAF'}</p>
                                <p class="text-lg font-black text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || d['JUMLAH NILAI KESELURUHAN'] || 'RM 0'}</p>
                            </div>
                        </div>${del}`;
                    list.appendChild(card);
                };

                live.forEach(d => render(d, 'reports'));
                excel.forEach(d => render(d, 'kes_penguatkuasaan'));
                lucide.createIcons();
            } catch (e) { alert("Ralat Fetch: " + e.message); }
        }

        async function editRec(id, src) {
            const loader = document.getElementById('loader'); loader.style.display = 'flex';
            try {
                const doc = await db.collection(src).doc(id).get();
                const d = doc.data();
                const form = document.getElementById('mainForm');
                resetForm();

                document.getElementById('currentDocId').value = id;
                document.getElementById('currentSource').value = src;
                document.getElementById('btnSubmit').innerText = `KEMASKINI [${src.toUpperCase()}] #${d.BIL || d['BIL']}`;

                // Map data ke form
                MASTER_COLUMNS.forEach(col => {
                    if(form.elements[col.id]) {
                        // Check clean key, then official header
                        form.elements[col.id].value = d[col.id] || d[col.header] || "";
                    }
                });

                toggleHistory(); runCalc(); window.scrollTo(0,0);
            } catch (e) { alert(e.message); }
            finally { loader.style.display = 'none'; }
        }

        async function deleteRec(id, src) {
            if(confirm(`Padam rekod ini secara kekal dari ${src.toUpperCase()}?`)) {
                await db.collection(src).doc(id).delete();
                fetchHistory();
            }
        }

        // --- HELPERS ---
        function resetForm() { 
            document.getElementById('mainForm').reset(); 
            document.getElementById('currentDocId').value = ""; 
            document.getElementById('currentSource').value = "reports";
            document.getElementById('btnSubmit').innerText = "SIMPAN DATABASE GLOBAL v102";
            document.getElementById('disp_total').value = "RM 0.00";
            loadProfile(firebase.auth().currentUser);
        }

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; 
            if(s.style.left === '0px') fetchHistory(); 
        }

        function toggleProfile() { 
            const s = document.getElementById('profileSidebar'); 
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; 
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }

        async function exportToExcel() {
            const live = await db.collection("reports").get();
            const excel = await db.collection("kes_penguatkuasaan").get();
            const data = [];
            [live, excel].forEach(snap => snap.forEach(doc => data.push(doc.data())));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Database");
            XLSX.writeFile(wb, "JPV_Penguatkuasa_v102.xlsx");
        }

        lucide.createIcons();
    </script>
</body>
</html>
