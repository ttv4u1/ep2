<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Penguatkuasa v76 - Pro Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9; color: #0f172a; 
            font-size: 16px;
        }

        /* ANIMATED COLORFUL VERSION */
        @keyframes rainbowText {
            0% { color: #ff0000; }
            25% { color: #ffcc00; }
            50% { color: #00ff00; }
            75% { color: #0066ff; }
            100% { color: #ff00ff; }
        }
        .version-v76 { font-weight: 900; animation: rainbowText 4s infinite linear; }

        .section-card {
            background: white; border-radius: 20px; padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 2rem;
        }
        .input-label {
            font-size: 13px; font-weight: 800; text-transform: uppercase; color: #334155; 
            margin-bottom: 8px; display: block; letter-spacing: 0.05em;
        }
        .form-input-modern {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 16px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .animal-grid-item { background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }

        /* PRINT OPTIMIZATION v76 - NO BOXES, ONLY TEXT */
        @media print {
            @page { size: A4 portrait; margin: 0.5cm; }
            body { background: white !important; font-size: 8pt !important; color: black !important; }
            .no-print { display: none !important; }
            
            /* Buang kotak & bayangan semasa print */
            .section-card, .animal-grid-item, .bg-indigo-50, .bg-slate-900 { 
                background: transparent !important; 
                box-shadow: none !important; 
                border: none !important; 
                padding: 2px !important; 
                margin-bottom: 4px !important; 
                border-radius: 0 !important;
            }
            
            /* Garisan bawah nipis sahaja untuk data */
            .form-input-modern { 
                border: none !important; 
                border-bottom: 0.5px solid #000 !important; 
                background: transparent !important;
                padding: 0 !important;
                font-size: 8.5pt !important;
                font-weight: 600 !important;
                border-radius: 0 !important;
            }

            .input-label { 
                font-size: 7.5pt !important; 
                margin-bottom: 0 !important; 
                color: #555 !important;
                font-weight: bold !important;
            }

            /* Susunan grid A4 yang padat */
            .grid { 
                display: grid !important; 
                grid-template-columns: repeat(4, 1fr) !important; 
                gap: 8px !important; 
            }
            .lg\:col-span-2, .lg\:col-span-3, .lg\:col-span-4, .lg\:col-span-6, .lg\:col-span-12 {
                grid-column: span 1 / span 1 !important;
            }

            /* Header Print Bersih */
            #print-header { 
                display: flex !important; 
                justify-content: space-between; 
                align-items: center; 
                border-bottom: 1px solid #000; 
                margin-bottom: 10px; 
                padding-bottom: 5px;
            }
            #print-header img { height: 30px; }
            #print-header h1 { font-size: 10pt; font-weight: 900; }
            
            /* Pastikan Nilai 42 kelihatan sebagai teks biasa */
            #total_val_web { font-size: 12pt !important; color: black !important; border-bottom: 2px solid #000 !important; }
        }

        #print-header { display: none; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-[400px] h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8 no-print">

            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase">Simpan Profil</button>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-4">Log Keluar</button>
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let currentUser = null;
        let userMeta = { name: '', gred: '', cawangan: '' };

        function updateClock() {
            const now = new Date();
            const days = ["AHAD", "ISNIN", "SELASA", "RABU", "KHAMIS", "JUMAAT", "SABTU"];
            let h = now.getHours();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            const timeStr = `${h}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} ${ampm}`;
            const fullStr = `${days[now.getDay()]}, ${now.getDate()} APR 2026 | ${timeStr}`;
            document.getElementById('realtime-clock').innerText = fullStr;
            document.getElementById('print-timestamp').innerText = "Dicetak pada: " + fullStr;
        }
        setInterval(updateClock, 1000);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => { document.getElementById('app-content').classList.add('opacity-100'); }, 50);
                loadProfile(user);
                resetForm();
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            const isOpen = s.style.left === '0px';
            s.style.left = isOpen ? '-100%' : '0px'; 
            if(!isOpen) fetchHistory();
        }
        function toggleProfile() { const s = document.getElementById('profileSidebar'); s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('currentDocId').value = "";
            document.getElementById('f_tahun').value = 2026;
            calcTotal();
        }

        function calcTotal() {
            let sum = 0;
            document.querySelectorAll('.calc').forEach(i => sum += Number(i.value || 0));
            document.getElementById('total_val_web').value = "RM " + sum.toLocaleString('en-MY', {minimumFractionDigits: 2});
        }
        document.getElementById('mainForm').addEventListener('input', calcTotal);

        async function saveToFirebase() {
            if(!currentUser || !userMeta.name) { alert("Lengkapkan profil!"); toggleProfile(); return; }
            document.getElementById('loader').style.display = 'flex';
            try {
                const formData = new FormData(document.getElementById('mainForm'));
                const data = Object.fromEntries(formData.entries());
                Object.keys(data).forEach(k => { if(typeof data[k] === 'string') data[k] = data[k].toUpperCase(); });
                data.userId = currentUser.uid;
                data.recordedBy = `${userMeta.name} (${userMeta.gred})`;
                data.cawangan = userMeta.cawangan;
                data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                
                const now = new Date();
                let h = now.getHours();
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                data.recordedTime = `${h}:${now.getMinutes().toString().padStart(2,'0')} ${ampm}`;

                const docId = document.getElementById('currentDocId').value;
                if(docId) await db.collection("reports").doc(docId).set(data, {merge: true});
                else await db.collection("reports").add(data);
                alert("Tersimpan!");
                resetForm();
            } catch (e) { alert(e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function fetchHistory() {
            const listDiv = document.getElementById('historyList');
            listDiv.innerHTML = '<p class="text-center py-10 font-bold animate-pulse text-xs uppercase">Memuatkan...</p>';
            const snapshot = await db.collection("reports").where("userId", "==", currentUser.uid).get();
            let docs = []; snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            docs.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
            listDiv.innerHTML = "";
            docs.forEach(d => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border-l-8 border-indigo-600 shadow-sm hover:shadow-md cursor-pointer transition";
                card.onclick = () => {
                    document.getElementById('currentDocId').value = d.id;
                    Object.keys(d).forEach(k => { const i = document.querySelector(`[name="${k}"]`); if(i) i.value = d[k]; });
                    calcTotal(); toggleHistory();
                };
                card.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[10px] font-black bg-indigo-50 px-2 py-1 rounded">BIL: ${d.BIL||'-'}</span><span class="text-indigo-600 font-black text-xs">${d.JUMLAH_NILAI_KESELURUHAN||'RM 0.00'}</span></div><h4 class="font-black text-slate-800 uppercase text-[10px] truncate">${d.KATEGORI_KES||'KES'}</h4><p class="text-[9px] font-bold text-slate-400 mt-1 uppercase">${d.recordedBy} | ${d.recordedTime}</p>`;
                listDiv.appendChild(card);
            });
            lucide.createIcons();
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.exists ? doc.data() : {};
            userMeta = { name: d.name||'', gred: d.gred||'', cawangan: d.cawangan||'' };
            document.getElementById('navName').innerText = userMeta.name || 'SILA SET PROFIL';
            document.getElementById('navAvatar').src = user.photoURL || "https://ui-avatars.com/api/?background=4f46e5&color=fff&name="+(userMeta.name||'P');
            document.getElementById('userName').value = userMeta.name;
            document.getElementById('userGred').value = userMeta.gred;
            document.getElementById('userCawangan').value = userMeta.cawangan;
            if(userMeta.name) document.getElementById('form_staff').value = `${userMeta.name} (${userMeta.gred}) / ${userMeta.cawangan}`.toUpperCase();
        }

        async function saveProfile() {
            const n = document.getElementById('userName').value.toUpperCase();
            const g = document.getElementById('userGred').value.toUpperCase();
            const c = document.getElementById('userCawangan').value.toUpperCase();
            await db.collection("users").doc(currentUser.uid).set({name:n, gred:g, cawangan:c}, {merge:true});
            location.reload();
        }

        function printReport() { window.print(); }
        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
