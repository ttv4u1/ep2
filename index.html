    <!-- Sidebar Master Database -->

    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-md h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-10 no-print">
        <div class="flex justify-between items-center mb-10"><h2 class="font-black text-2xl italic uppercase">Profil Pegawai</h2><button onclick="toggleProfile()"><i data-lucide="x"></i></button></div>
        <div class="space-y-8">
            <div id="superAdminBadge" class="hidden bg-rose-600 text-white font-black text-center py-3 rounded-2xl text-xs uppercase shadow-xl shadow-rose-200">Super Admin Access</div>

        </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRole = 'USER';

        // 44 Header Utama
        const COLUMN_MAP = {
            "BIL": "BIL", "TAHUN": "TAHUN", "BULAN": "BULAN", "PENGUATKUASA": "PENGUATKUASA",
            "KATEGORI KES": "KATEGORI_KES", "NO REPOT POLIS": "NO_REPOT_POLIS", "TARIKH KEJADIAN": "TARIKH_KEJADIAN",
            "MASA KEJADIAN": "MASA_KEJADIAN", "LOKASI KEJADIAN": "LOKASI_KEJADIAN", "KESALAHAN": "KESALAHAN",
            "UNDANG-UNDANG": "UNDANG_UNDANG", "NO KES IP": "NO_KES_IP", "JENIS RAMPASAN": "JENIS_RAMPASAN",
            "LEMBU": "LEMBU", "KERBAU": "KERBAU", "KAMBING": "KAMBING", "BEBIRI": "BEBIRI", "BABI": "BABI", "AYAM": "AYAM",
            "KARKAS LEMBU": "KARKAS_LEMBU", "KARKAS KERBAU": "KARKAS_KERBAU", "KARKAS KAMBING": "KARKAS_KAMBING",
            "KARKAS BABI": "KARKAS_BABI", "KARKAS BABI SEJUK BEKU": "KARKAS_BABI_SEJUK_BEKU", "KARKAS AYAM": "KARKAS_AYAM",
            "PRODUK SEJUK BEKU ITIK": "PRODUK_SEJUK_BEKU_ITIK", "PRODUK SEJUK BEKU AYAM": "PRODUK_SEJUK_BEKU_AYAM",
            "PRODUK SEJUK BEKU BABI": "PRODUK_SEJUK_BEKU_BABI", "PRODUK HAIWAN (TIN)": "PRODUK_HAIWAN_TIN",
            "ANJING": "ANJING", "KUCING": "KUCING", "ARNAB": "ARNAB", "BURUNG": "BURUNG", "HAMSTER": "HAMSTER",
            "RAMPASAN LAIN-LAIN": "RAMPASAN_LAIN_LAIN", "JUMLAH RAMPASAN KENDERAAN": "JUMLAH_RAMPASAN_KENDERAAN",
            "RAMPASAN PENGANGKUTAN": "RAMPASAN_PENGANGKUTAN",
            "ANGGARAN NILAI (EKOR/KG)": "ANGGARAN_NILAI_EKOR_KG", "ANGGARAN NILAI (KENDERAAN)": "ANGGARAN_NILAI_KENDERAAN",
            "ANGGARAN NILAI (PENGANGKUT/KONTENA)": "ANGGARAN_NILAI_PENGANGKUT_KONTENA", "ANGGARAN NILAI (LAIN-LAIN)": "ANGGARAN_NILAI_LAIN_LAIN",
            "JUMLAH NILAI KESELURUHAN": "JUMLAH_NILAI_KESELURUHAN", "KES SERAHAN": "KES_SERAHAN", "CATATAN": "CATATAN"
        };

        // AUTH & BOOTSTRAP
        firebase.auth().onAuthStateChanged(async u => {
            if (u) {
                document.getElementById('landing-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('navAvatar').src = u.photoURL;
                if(['ttv4u1@gmail.com', 'roland@dvs.gov.my'].includes(u.email)) {
                    userRole = 'ADMIN';
                    document.getElementById('superAdminBadge').classList.remove('hidden');
                }
                await loadProfile(u);
                lucide.createIcons();
            } else {
                document.getElementById('landing-screen').classList.remove('hidden');
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await firebase.auth().signInWithPopup(provider); } catch(e) { alert("Ralat Akses: " + e.message); }
        }

        async function loadProfile(u) {
            try {
                const doc = await db.collection("users").doc(u.uid).get();
                const d = doc.data() || {};
                document.getElementById('p_name').value = d.name || u.displayName || "";
                document.getElementById('p_caw').value = d.cawangan || "";
                if(d.name) document.getElementById('f_staff').value = `${d.name} / ${d.cawangan}`.toUpperCase();
            } catch(e) { console.log("Permasalahan Profil."); }
        }

        function runCalc() {
            const keys = ['ANGGARAN_NILAI_EKOR_KG', 'ANGGARAN_NILAI_KENDERAAN', 'ANGGARAN_NILAI_PENGANGKUT_KONTENA', 'ANGGARAN_NILAI_LAIN_LAIN'];
            let total = 0;
            keys.forEach(k => {
                const val = document.getElementsByName(k)[0].value;
                total += parseFloat(val) || 0;
            });
            document.getElementById('disp_total').value = "RM " + total.toLocaleString('en-US', {minimumFractionDigits:2});
        }
        document.addEventListener('input', e => { if(e.target.classList.contains('calc-field')) runCalc(); });

        async function submitData() {
            const loader = document.getElementById('loader'); loader.style.display = 'flex';
            const formData = new FormData(document.getElementById('mainForm'));
            const raw = Object.fromEntries(formData.entries());
            const docId = document.getElementById('currentDocId').value;
            const source = document.getElementById('currentSource').value;

            runCalc();
            raw.JUMLAH_NILAI_KESELURUHAN = document.getElementById('disp_total').value;

            const syncPayload = {};
            const dbPayload = {};
            Object.keys(COLUMN_MAP).forEach(officialKey => {
                const formKey = COLUMN_MAP[officialKey];
                const val = raw[formKey] || "";
                syncPayload[officialKey] = val;
                dbPayload[officialKey.replace(/[\/\(\)\-\s]/g, '_')] = val;
            });

            try {
                if(docId) {
                    await db.collection(source).doc(docId).update(dbPayload);
                } else {
                    dbPayload.timestamp = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("reports").add(dbPayload);
                }

                // Real-time Sync External
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(syncPayload) });
                try {
                    await fetch(`https://api.baserow.io/api/database/rows/table/${BASEROW_TABLE_ID}/?user_field_names=true`, {
                        method: 'POST',
                        headers: { 'Authorization': `Token ${BASEROW_TOKEN}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(syncPayload)
                    });
                } catch(e) {}

                alert("DATA BERJAYA DISINKRONKAN!"); resetForm();
            } catch (e) { alert("RALAT: " + e.message); }
            finally { loader.style.display = 'none'; }
        }

        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="p-20 text-center font-black animate-pulse text-indigo-600 uppercase text-xs">Menarik Semua Rekod 1-105...</div>';
            try {
                const [live, excel] = await Promise.all([
                    db.collection("reports").orderBy("BIL", "desc").get(),
                    db.collection("kes_penguatkuasaan").orderBy("BIL", "desc").get()
                ]);
                list.innerHTML = '';
                const render = (doc, src) => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border-2 hover:border-indigo-500 transition cursor-pointer relative group shadow-sm";
                    let del = (userRole === 'ADMIN') ? `<button onclick="event.stopPropagation(); deleteRec('${doc.id}', '${src}')" class="absolute top-4 right-4 text-rose-500 p-2"><i data-lucide="trash-2"></i></button>` : '';

                    card.innerHTML = `
                        <div onclick="editRec('${doc.id}', '${src}')">
                            <div class="flex justify-between mb-4">
                                <span class="text-[10px] font-black px-3 py-1 rounded-full bg-slate-100 text-indigo-600">#${d.BIL || '-'}</span>
                                <span class="text-[10px] font-black uppercase ${src === 'reports' ? 'text-blue-500' : 'text-emerald-500'}">${src.toUpperCase()}</span>
                            </div>
                            <h4 class="font-extrabold text-base uppercase leading-tight pr-10">${d.KESALAHAN || 'TIADA TAJUK'}</h4>
                            <div class="flex justify-between mt-6 items-end">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">${d.PENGUATKUASA || 'STAF'}</p>
                                <p class="text-lg font-black text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0'}</p>
                            </div>
                        </div>${del}`;
                    list.appendChild(card);
                };
                live.forEach(d => render(d, 'reports'));
                excel.forEach(d => render(d, 'kes_penguatkuasaan'));
                lucide.createIcons();
            } catch (e) { alert("Ralat Permission: Sila Login Google semula."); }
        }

        async function editRec(id, src) {
            const loader = document.getElementById('loader'); loader.style.display = 'flex';
            try {
                const doc = await db.collection(src).doc(id).get();
                const d = doc.data();
                const form = document.getElementById('mainForm');
                resetForm();
                document.getElementById('currentDocId').value = id;
                document.getElementById('currentSource').value = src;
                document.getElementById('btnSubmit').innerText = `KEMASKINI [${src.toUpperCase()}] #${d.BIL}`;

                Object.keys(COLUMN_MAP).forEach(officialKey => {
                    const formKey = COLUMN_MAP[officialKey];
                    const firestoreKey = officialKey.replace(/[\/\(\)\-\s]/g, '_');
                    if(form.elements[formKey]) {
                        form.elements[formKey].value = d[firestoreKey] || d[officialKey] || "";
                    }
                });
                toggleHistory(); runCalc();
            } catch (e) { alert(e.message); }
            finally { loader.style.display = 'none'; }
        }

        async function deleteRec(id, src) {
            if(confirm("Padam kekal dari Firestore?")) { await db.collection(src).doc(id).delete(); fetchHistory(); }
        }

        async function exportExcel() {
            const snap = await db.collection("reports").get();
            const data = []; snap.forEach(doc => data.push(doc.data()));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Database");
            XLSX.writeFile(wb, "JPV_Data_v104.xlsx");
        }

        function resetForm() { 
            document.getElementById('mainForm').reset(); 
            document.getElementById('currentDocId').value = ""; 
            document.getElementById('currentSource').value = "reports";
            document.getElementById('btnSubmit').innerText = "SIMPAN DATABASE GLOBAL v104";
            document.getElementById('disp_total').value = "RM 0.00";
            loadProfile(firebase.auth().currentUser);
        }

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; 
            if(s.style.left === '0px') fetchHistory(); 
        }

        function toggleProfile() { 
            const s = document.getElementById('profileSidebar'); 
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; 
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        lucide.createIcons();
    </script>
</body>
</html>
