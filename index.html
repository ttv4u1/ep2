<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Penguatkuasa v18 | Edisi Profesional</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc; color: #0f172a; 
            font-size: 18px; /* Tulisan lebih besar */
        }
        .master-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30%; opacity: 0.04; z-index: -1; pointer-events: none;
        }
        .section-card {
            background: white; border-radius: 12px; padding: 1rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 0.5rem;
        }
        .input-label {
            font-size: 13px; font-weight: 800; text-transform: uppercase; color: #475569; 
            margin-bottom: 1px; display: block; letter-spacing: 0.02em;
        }
        .form-input-modern {
            width: 100%; padding: 6px 10px; border-radius: 6px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 18px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; }
        .animal-item { background: #f8fafc; padding: 6px; border-radius: 6px; border: 1px solid #e2e8f0; }

        .avatar-preset {
            width: 60px; height: 60px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s;
            background: #f1f5f9; padding: 5px;
        }
        .avatar-preset.active { border-color: #4f46e5; background: #eef2ff; }

        /* PRINT OPTIMIZATION - COMPACT A4 SINGLE PAGE */
        @media print { 
            @page { size: A4 portrait; margin: 0.3cm; }
            body { background: white !important; font-size: 10pt !important; }
            .no-print { display: none !important; } 
            .section-card { 
                border: 1px solid #000 !important; 
                padding: 5px !important; 
                margin-bottom: 4px !important; 
                box-shadow: none !important;
                border-radius: 0 !important;
            }
            .form-input-modern { 
                border: none !important; 
                border-bottom: 1px solid #000 !important; 
                padding: 0 !important; 
                font-size: 11pt !important; 
                font-weight: bold !important;
                min-height: auto !important;
            }
            .input-label { font-size: 8pt !important; font-weight: 900 !important; color: #000 !important; }
            .animal-item { background: none !important; border: 0.5px solid #ccc !important; padding: 2px !important; }
            #total_val { color: black !important; font-size: 20pt !important; }
            .bg-slate-900 { background: #eee !important; color: black !important; border: 1px solid #000 !important; }
            .master-bg { width: 150px !important; top: 10% !important; right: 10% !important; left: auto !important; transform: none !important; }
            h3 { font-size: 9pt !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="antialiased">

    <img src="https://www.akm.gov.my/images/madani/JATA%20NEGARA%20AI-01.png" class="master-bg">

    <!-- LANDING SCREEN -->
    <section id="landing-screen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950">
        <div class="p-10 text-center bg-white/5 backdrop-blur-xl rounded-[40px] border border-white/10 w-[90%] max-w-md">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-28 mx-auto mb-6">
            <h1 class="text-3xl font-black text-white mb-1">e-Penguatkuasa</h1>
            <p class="text-indigo-400 text-xs font-bold tracking-[0.3em] mb-10 uppercase">v18 Build 2026</p>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-4 bg-white text-slate-950 font-black py-4 rounded-2xl hover:bg-indigo-50 transition shadow-2xl text-lg">
                <img src="https://www.google.com/favicon.ico" class="w-6 h-6"> LOG MASUK GOOGLE
            </button>
        </div>
    </section>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700 min-h-screen">
        
        <header class="sticky top-0 z-40 bg-white border-b-2 border-slate-200 no-print shadow-sm">
            <div class="w-full px-6 py-3 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-10">
                    <div>
                        <h2 class="text-xl font-black text-slate-800 uppercase leading-none tracking-tight">Laporan Penguatkuasaan v18</h2>
                        <span class="text-[10px] font-extrabold text-indigo-600 uppercase tracking-widest">Enforcement Integrated System</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="printReport()" class="flex items-center gap-2 px-6 py-2 bg-slate-900 text-white rounded-xl hover:bg-black transition text-sm font-black uppercase shadow-lg">
                        <i data-lucide="printer" class="w-5 h-5"></i> CETAK A4
                    </button>
                    <button onclick="toggleProfile()" class="flex items-center gap-3 bg-slate-100 p-1.5 pr-4 rounded-full hover:bg-indigo-50 border border-slate-200 transition">
                        <img id="navAvatar" src="" class="w-9 h-9 rounded-full object-cover bg-white shadow-inner">
                        <span class="text-xs font-black uppercase" id="navName">Pegawai</span>
                    </button>
                    <button onclick="logout()" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <main class="w-full px-4 py-4 max-w-[1600px] mx-auto">
            <form id="mainForm">
                
                <div class="section-card">
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                        <div><label class="input-label">No. Bil</label><input type="text" name="BIL" class="form-input-modern"></div>
                        <div><label class="input-label">Tahun</label><input type="number" name="TAHUN" class="form-input-modern" value="2026"></div>
                        <div><label class="input-label">Bulan</label>
                            <select name="BULAN" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="col-span-1"><label class="input-label">Kategori</label><input type="text" name="KATEGORI_KES" class="form-input-modern"></div>
                        <div class="col-span-2"><label class="input-label">Nama Pegawai</label><input type="text" name="PENGUATKUASA" id="form_staff" class="form-input-modern bg-indigo-50/30" readonly></div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                        <div class="md:col-span-3"><label class="input-label">No. Repot</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern"></div>
                        <div class="md:col-span-2"><label class="input-label">Tarikh</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div class="md:col-span-2"><label class="input-label">Masa</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                        <div class="md:col-span-5"><label class="input-label">Lokasi</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern"></div>
                        <div class="md:col-span-4"><label class="input-label">Kesalahan</label><input type="text" name="KESALAHAN" class="form-input-modern"></div>
                        <div class="md:col-span-5"><label class="input-label">Undang-Undang</label><input type="text" name="UNDANG_UNDANG" class="form-input-modern"></div>
                        <div class="md:col-span-3"><label class="input-label">No. IP</label><input type="text" name="NO_KES_IP" class="form-input-modern"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2">
                    <div class="section-card !mb-0">
                        <h3 class="text-indigo-700 font-black text-xs mb-2 border-b pb-1">HAIWAN HIDUP (EKOR)</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="animal-item"><label class="input-label">Lembu</label><input type="number" name="LEMBU" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Kerbau</label><input type="number" name="KERBAU" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Kambing</label><input type="number" name="KAMBING" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Bebiri</label><input type="number" name="BEBIRI" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Babi</label><input type="number" name="BABI" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Ayam</label><input type="number" name="AYAM" class="form-input-modern" value="0"></div>
                        </div>
                    </div>
                    <div class="section-card !mb-0">
                        <h3 class="text-indigo-700 font-black text-xs mb-2 border-b pb-1">DAGING / PRODUK (KG)</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="animal-item"><label class="input-label">D. Lembu</label><input type="number" name="KARKAS_LEMBU" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">D. Kerbau</label><input type="number" name="KARKAS_KERBAU" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">D. Kambing</label><input type="number" name="KARKAS_KAMBING" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">D. Babi</label><input type="number" name="KARKAS_BABI" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">Babi (Frozen)</label><input type="number" name="KARKAS_BABI_SEJUK_BEKU" class="form-input-modern" value="0"></div>
                            <div class="animal-item"><label class="input-label">D. Ayam</label><input type="number" name="KARKAS_AYAM" class="form-input-modern" value="0"></div>
                        </div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        <div class="md:col-span-2"><label class="input-label">Rampasan Lain</label><input type="text" name="JENIS_RAMPASAN" class="form-input-modern" placeholder="Cth: 1 Lori"></div>
                        <div><label class="input-label">Bil. Kenderaan</label><input type="number" name="JUMLAH_RAMPASAN_KENDERAAN" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Model Pengangkut</label><input type="text" name="RAMPASAN_PENGANGKUT" class="form-input-modern"></div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
                        <div class="bg-indigo-50/50 p-2 rounded-lg border border-indigo-100"><label class="input-label">Nilai Haiwan (RM)</label><input type="number" name="ANGGARAN_NILAI_EKOR_KG" class="calc form-input-modern border-indigo-200" value="0"></div>
                        <div class="bg-indigo-50/50 p-2 rounded-lg border border-indigo-100"><label class="input-label">Nilai Kenderaan (RM)</label><input type="number" name="ANGGARAN_NILAI_KENDERAAN" class="calc form-input-modern border-indigo-200" value="0"></div>
                        <div class="bg-indigo-50/50 p-2 rounded-lg border border-indigo-100"><label class="input-label">Nilai Logistik (RM)</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="calc form-input-modern border-indigo-200" value="0"></div>
                        <div class="bg-indigo-50/50 p-2 rounded-lg border border-indigo-100"><label class="input-label">Lain-lain (RM)</label><input type="number" name="ANGGARAN_NILAI_LAIN_LAIN" class="calc form-input-modern border-indigo-200" value="0"></div>
                    </div>
                    
                    <div class="mt-4 bg-slate-900 rounded-xl p-4 text-white flex justify-between items-center shadow-lg">
                        <span class="text-sm font-black uppercase tracking-wider text-indigo-300">JUMLAH NILAI KESELURUHAN (RM)</span>
                        <input type="text" id="total_val" name="JUMLAH_NILAI_KESELURUHAN" readonly class="bg-transparent text-right font-black text-3xl outline-none text-white w-1/2" value="RM 0.00">
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-[450px] h-full bg-white z-[1001] shadow-2xl transition-all duration-500 overflow-y-auto no-print">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-2xl text-slate-900 uppercase">Profil Penguatkuasa</h2>
                <button onclick="toggleProfile()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="text-center mb-6">
                <img id="sideAvatar" src="" class="w-32 h-32 mx-auto rounded-2xl border-4 border-indigo-50 shadow-xl object-cover bg-slate-100 mb-4">
                <label for="uploadImg" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold cursor-pointer hover:bg-indigo-700">TUKAR GAMBAR</label>
                <input type="file" id="uploadImg" class="hidden" accept="image/*" onchange="previewImage(this)">
            </div>

            <div class="mb-8 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <label class="input-label mb-3 text-center">Ikon Penguatkuasa Pilihan</label>
                <div class="flex flex-wrap justify-center gap-3" id="avatarPicker"></div>
            </div>

            <div class="space-y-4">
                <div><label class="input-label">Nama Penuh</label><input type="text" id="userName" class="form-input-modern uppercase"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="input-label">Gred</label><input type="text" id="userGred" class="form-input-modern uppercase" placeholder="G29"></div>
                    <div><label class="input-label">Unit/Cawangan</label><input type="text" id="userCawangan" class="form-input-modern uppercase"></div>
                </div>
                <button onclick="saveProfile()" class="w-full mt-6 bg-slate-900 text-white font-black py-4 rounded-xl shadow-xl hover:bg-black transition uppercase text-sm">Kemaskini Profil</button>
            </div>
        </div>
    </aside>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let currentAvatarUrl = "";
        const presets = [
            "https://cdn-icons-png.flaticon.com/512/1022/1022330.png", // Officer Icon
            "https://cdn-icons-png.flaticon.com/512/2919/2919630.png", // Police/Enforcement
            "https://cdn-icons-png.flaticon.com/512/2304/2304226.png", // Male Officer
            "https://cdn-icons-png.flaticon.com/512/2304/2304241.png", // Female Officer
            "https://cdn-icons-png.flaticon.com/512/2042/2042918.png", // Badge Icon
            "https://cdn-icons-png.flaticon.com/512/1946/1946429.png"  // User Solid
        ];

        function initAvatarPicker() {
            const container = document.getElementById('avatarPicker');
            container.innerHTML = '';
            presets.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'avatar-preset';
                img.onclick = () => selectPreset(url, img);
                container.appendChild(img);
            });
        }

        function selectPreset(url, el) {
            currentAvatarUrl = url;
            document.getElementById('sideAvatar').src = url;
            document.querySelectorAll('.avatar-preset').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('app-content').classList.add('opacity-100'), 50);
                initAvatarPicker();
                loadProfile(user);
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm('Log keluar?')) firebase.auth().signOut().then(() => location.reload()); }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            let data = doc.exists ? doc.data() : {};
            const name = data.name || user.displayName || 'PEGAWAI';
            const gred = data.gred || '';
            const cawangan = data.cawangan || '';
            currentAvatarUrl = data.avatar || presets[0];

            document.getElementById('navName').innerText = name;
            document.getElementById('navAvatar').src = currentAvatarUrl;
            document.getElementById('sideAvatar').src = currentAvatarUrl;
            document.getElementById('userName').value = name;
            document.getElementById('userGred').value = gred;
            document.getElementById('userCawangan').value = cawangan;
            document.getElementById('form_staff').value = `${name} (${gred}) / ${cawangan}`.toUpperCase();
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentAvatarUrl = e.target.result;
                    document.getElementById('sideAvatar').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            await db.collection("users").doc(user.uid).set({
                name: document.getElementById('userName').value,
                gred: document.getElementById('userGred').value,
                cawangan: document.getElementById('userCawangan').value,
                avatar: currentAvatarUrl
            }, { merge: true });
            location.reload();
        }

        function toggleProfile() {
            const s = document.getElementById('profileSidebar');
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px';
        }

        function calcTotal() {
            let sum = 0;
            document.querySelectorAll('.calc').forEach(i => sum += Number(i.value || 0));
            document.getElementById('total_val').value = "RM " + sum.toLocaleString('en-MY', {minimumFractionDigits: 2});
        }
        document.querySelectorAll('.calc').forEach(i => i.addEventListener('input', calcTotal));

        function printReport() { 
            calcTotal();
            window.print(); 
        }
    </script>
</body>
</html>
