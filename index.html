<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Penguatkuasa v88 - Pro Edition</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9; color: #0f172a; 
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes goldShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .premium-gold-btn {
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            color: #451a03;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(251, 191, 36, 0.5);
            animation: goldShimmer 4s linear infinite;
        }
        .version-box {
            display: inline-block;
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            animation: goldShimmer 3s linear infinite;
            color: #451a03; padding: 2px 10px; border-radius: 8px;
            font-weight: 900; font-size: 0.75em; vertical-align: middle;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .section-card {
            background: white; border-radius: 24px; padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0; margin-bottom: 1.5rem;
        }
        .form-input-modern {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 16px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .input-label {
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; 
            margin-bottom: 4px; display: block; letter-spacing: 0.05em;
        }

        @media print {
            @page { size: A4; margin: 1cm; }
            .no-print { display: none !important; }
            body { background: white !important; }
            .section-card { border: 1px solid #000 !important; box-shadow: none !important; margin-bottom: 10px !important; }
            .form-input-modern { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0 !important; padding: 2px !important; }
            .print-section-title { display: block !important; font-weight: 800; border-bottom: 2px solid #000; margin-top: 15px; }
        }
        .print-section-title { display: none; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-indigo-600 uppercase text-xs">Memproses Data...</p>
    </div>

    <!-- Login -->
    <section id="landing-screen" class="fixed inset-0 z-[3000] flex items-center justify-center bg-[#020617]">
        <div class="p-8 text-center bg-white/5 backdrop-blur-2xl rounded-[40px] border border-white/10 w-[90%] max-w-sm shadow-2xl">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">e-Penguatkuasa <span class="version-box">v88</span></h1>
            <button onclick="loginGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition mt-8 uppercase text-sm">
                AKSES SISTEM
            </button>
        </div>
    </section>

    <!-- App Content -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700 min-h-screen">
        
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print shadow-sm">
            <div class="w-full px-4 py-3 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center">
                <div class="flex items-center gap-3">
                    <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-8 sm:h-10">
                    <h2 class="text-base sm:text-lg font-black text-slate-800 uppercase leading-none">Borang <span class="version-box">v88</span></h2>
                </div>
                <div class="flex flex-wrap items-center gap-1 sm:gap-2">
                    <button onclick="resetForm()" class="px-3 py-2 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px]">Baru</button>
                    <button onclick="toggleHistory()" class="px-3 py-2 bg-amber-500 text-slate-900 rounded-xl font-black uppercase text-[10px]">Rekod</button>
                    <button onclick="exportToExcel()" class="px-3 py-2 bg-emerald-600 text-white rounded-xl font-black uppercase text-[10px]">Excel</button>
                    <button onclick="exportToCSV()" class="px-3 py-2 bg-blue-600 text-white rounded-xl font-black uppercase text-[10px]">Access</button>
                    <button onclick="printReport()" class="px-3 py-2 bg-slate-900 text-white rounded-xl font-black uppercase text-[10px]">Cetak</button>
                    <button onclick="toggleProfile()" class="ml-1 p-1 bg-slate-100 rounded-full border">
                        <img id="navAvatar" src="" class="w-6 h-6 rounded-full object-cover">
                    </button>
                </div>
            </div>
        </header>

        <main class="w-full px-4 sm:px-6 py-6 mx-auto max-w-7xl">
            <form id="mainForm">
                <input type="hidden" id="currentDocId" name="currentDocId" value="">

                <h3 class="print-section-title">A. MAKLUMAT PENGURUSAN</h3>
                <div class="section-card">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                        <div><label class="input-label">1. Bil</label><input type="text" name="BIL" class="form-input-modern uppercase" placeholder="001/2026"></div>
                        <div><label class="input-label">2. Tahun</label><input type="number" name="TAHUN" id="f_tahun" class="form-input-modern" value="2026"></div>
                        <div><label class="input-label">3. Bulan</label>
                            <select name="BULAN" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="sm:col-span-3"><label class="input-label">4. Pegawai Penguatkuasa</label><input type="text" id="form_staff" name="PENGUATKUASA" class="form-input-modern bg-slate-50 uppercase" readonly></div>
                        <div class="sm:col-span-2"><label class="input-label">5. Kategori Kes</label><input type="text" name="KATEGORI_KES" class="form-input-modern uppercase"></div>
                        <div class="sm:col-span-2"><label class="input-label">6. No Repot Polis</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern uppercase"></div>
                        <div class="sm:col-span-2"><label class="input-label">7. Tarikh & Masa</label><div class="flex gap-1"><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div></div>
                        <div class="sm:col-span-3"><label class="input-label">8. Lokasi Kejadian</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern uppercase"></div>
                        <div class="sm:col-span-3"><label class="input-label">9. Kesalahan</label><input type="text" name="KESALAHAN" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <h3 class="print-section-title">B. RINGKASAN NILAI RAMPASAN</h3>
                <div class="section-card border-l-[12px] border-indigo-600 print:border-l-0">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                        <div><label class="input-label">38. Nilai Ekor/KG (RM)</label><input type="number" name="VAL_EKOR" class="calc form-input-modern" value="0"></div>
                        <div><label class="input-label">39. Nilai Kenderaan (RM)</label><input type="number" name="VAL_KENDERAAN" class="calc form-input-modern" value="0"></div>
                        <div><label class="input-label">40. Nilai Kontena (RM)</label><input type="number" name="VAL_KONTENA" class="calc form-input-modern" value="0"></div>
                        <div><label class="input-label">41. Nilai Lain (RM)</label><input type="number" name="VAL_LAIN" class="calc form-input-modern" value="0"></div>
                    </div>
                    <div class="mt-6 p-4 bg-slate-50 rounded-xl">
                        <label class="input-label">42. JUMLAH KESELURUHAN (RM)</label>
                        <input type="text" id="total_val_display" name="JUMLAH_KESELURUHAN" readonly class="w-full bg-transparent text-3xl font-black text-indigo-700 outline-none" value="RM 0.00">
                    </div>
                    <div class="mt-8 no-print flex justify-center">
                        <button type="button" onclick="saveToFirebase()" class="w-full sm:w-auto px-12 py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase shadow-xl hover:scale-105 transition active:scale-95">Simpan Rekod</button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- DB SIDEBAR -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-lg h-full bg-slate-50 z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto no-print p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Database Laporan</h2>
            <button onclick="toggleHistory()" class="p-2 bg-white rounded-full border shadow-sm"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="space-y-4"></div>
    </aside>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8 no-print border-l">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl uppercase italic">Profil</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="text-center mb-6">
            <div id="adminBadge" class="hidden inline-block bg-red-600 text-white text-[10px] font-black px-4 py-1 rounded-full uppercase mb-2">SUPER ADMIN</div>
        </div>
        <div class="space-y-4">
            <div><label class="input-label">Nama Penuh</label><input type="text" id="userName" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred</label><input type="text" id="userGred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Cawangan</label><input type="text" id="userCawangan" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase">Simpan Profil</button>
            <div id="adminControls" class="hidden mt-6">
                <button onclick="openAdminPanel()" class="premium-gold-btn w-full font-black py-4 rounded-2xl uppercase flex items-center justify-center gap-2">
                    <i data-lucide="shield"></i> Admin Panel
                </button>
            </div>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-4">Log Keluar</button>
        </div>
    </aside>

    <!-- ADMIN MODAL -->
    <div id="adminModal" class="fixed inset-0 bg-slate-900/90 z-[3000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-[32px] max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-black uppercase">Admin Control</h2>
                <button onclick="closeAdminPanel()"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-indigo-50 p-4 rounded-xl">
                        <p class="text-[10px] font-bold text-indigo-600 uppercase">Total Kes</p>
                        <h3 id="statTotalKes" class="text-2xl font-black">0</h3>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl">
                        <p class="text-[10px] font-bold text-emerald-600 uppercase">Total Nilai</p>
                        <h3 id="statTotalRM" class="text-xl font-black">RM 0</h3>
                    </div>
                </div>
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-100 uppercase font-black">
                        <tr><th class="p-3">Pegawai</th><th class="p-3">Role</th><th class="p-3">Aksi</th></tr>
                    </thead>
                    <tbody id="userManagementList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        lucide.createIcons();

        let currentUserData = null;

        // --- AUTH & PROFILE ---
        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (e) { console.error(e); }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('app-content').style.opacity = "1";
                await loadUserProfile(user);
                initCalc();
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        async function loadUserProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.exists ? doc.data() : {};
            currentUserData = data;

            const isAdmin = data.role === 'ADMIN' || user.email === 'ttv4u1@gmail.com';
            document.getElementById('adminBadge').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminControls').classList.toggle('hidden', !isAdmin);
            document.getElementById('navAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}`;
            
            document.getElementById('userName').value = data.name || user.displayName || '';
            document.getElementById('userGred').value = data.gred || '';
            document.getElementById('userCawangan').value = data.cawangan || '';
            
            if(data.name) {
                document.getElementById('form_staff').value = `${data.name} (${data.gred || ''}) / ${data.cawangan || ''}`.toUpperCase();
            }
        }

        async function saveProfile() {
            const user = auth.currentUser;
            const payload = {
                name: document.getElementById('userName').value.toUpperCase(),
                gred: document.getElementById('userGred').value.toUpperCase(),
                cawangan: document.getElementById('userCawangan').value.toUpperCase()
            };
            await db.collection("users").doc(user.uid).set(payload, {merge: true});
            alert("Profil dikemaskini!");
            location.reload();
        }

        // --- CORE FUNCTIONS (SAVE, NEW, PRINT, EXPORT) ---

        function initCalc() {
            document.querySelectorAll('.calc').forEach(input => {
                input.addEventListener('input', () => {
                    let total = 0;
                    document.querySelectorAll('.calc').forEach(i => total += Number(i.value) || 0);
                    document.getElementById('total_val_display').value = "RM " + total.toLocaleString('en-MY', {minimumFractionDigits: 2});
                });
            });
        }

        async function saveToFirebase() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            try {
                const form = document.getElementById('mainForm');
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());
                const docId = data.currentDocId;
                
                data.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
                data.officerId = auth.currentUser.uid;
                data.officerEmail = auth.currentUser.email;

                if (docId) {
                    await db.collection("reports").doc(docId).update(data);
                    alert("Rekod berjaya dikemaskini!");
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("reports").add(data);
                    alert("Rekod baru berjaya disimpan!");
                }
                resetForm();
            } catch (e) {
                alert("Ralat: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('currentDocId').value = "";
            document.getElementById('total_val_display').value = "RM 0.00";
            loadUserProfile(auth.currentUser);
        }

        function printReport() {
            window.print();
        }

        async function exportToExcel() {
            const snapshot = await db.collection("reports").get();
            const data = snapshot.docs.map(doc => {
                const d = doc.data();
                delete d.lastUpdated; delete d.createdAt; // Bersihkan data masa firebase
                return d;
            });
            if(data.length === 0) return alert("Tiada data.");
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `E-Penguatkuasa_${new Date().getTime()}.xlsx`);
        }

        async function exportToCSV() {
            const snapshot = await db.collection("reports").get();
            const data = snapshot.docs.map(doc => doc.data());
            if(data.length === 0) return;
            
            const headers = Object.keys(data[0]).join(",");
            const rows = data.map(obj => Object.values(obj).map(v => `"${v}"`).join(",")).join("\n");
            const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows;
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "Access_Import.csv");
            document.body.appendChild(link);
            link.click();
        }

        // --- HISTORY & ADMIN ---

        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center p-10 animate-pulse text-xs font-black uppercase">Mencari Data...</p>';
            
            const snapshot = await db.collection("reports").orderBy("createdAt", "desc").limit(20).get();
            list.innerHTML = '';
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-2xl border shadow-sm cursor-pointer hover:border-indigo-600 transition";
                item.onclick = () => {
                    const form = document.getElementById('mainForm');
                    Object.keys(d).forEach(key => { if(form.elements[key]) form.elements[key].value = d[key]; });
                    document.getElementById('currentDocId').value = doc.id;
                    document.querySelectorAll('.calc')[0].dispatchEvent(new Event('input')); // Trigger calc
                    toggleHistory();
                };
                item.innerHTML = `
                    <p class="text-[10px] font-black text-indigo-600">${d.BIL || 'TIADA BIL'}</p>
                    <h4 class="font-bold text-sm uppercase">${d.KATEGORI_KES || 'TANPA KATEGORI'}</h4>
                    <p class="text-[10px] text-slate-500 uppercase">${d.TARIKH_KEJADIAN} | ${d.LOKASI_KEJADIAN}</p>
                `;
                list.appendChild(item);
            });
        }

        async function fetchUsersList() {
            const container = document.getElementById('userManagementList');
            container.innerHTML = '';
            const users = await db.collection("users").get();
            users.forEach(doc => {
                const u = doc.data();
                const tr = document.createElement('tr');
                tr.className = "border-b";
                tr.innerHTML = `
                    <td class="p-3"><b>${u.name || 'BARU'}</b><br>${u.cawangan || '-'}</td>
                    <td class="p-3"><span class="px-2 py-1 bg-slate-100 rounded">${u.role || 'USER'}</span></td>
                    <td class="p-3">
                        <button onclick="changeRole('${doc.id}', '${u.role}')" class="text-indigo-600 font-bold">Tukar Role</button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        async function changeRole(uid, current) {
            const next = current === 'ADMIN' ? 'USER' : 'ADMIN';
            if(confirm(`Tukar ke ${next}?`)) {
                await db.collection("users").doc(uid).update({role: next});
                fetchUsersList();
            }
        }

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            const isOpen = s.style.left === '0px';
            s.style.left = isOpen ? '-100%' : '0px'; 
            if(!isOpen) fetchHistory();
        }
        function toggleProfile() { const s = document.getElementById('profileSidebar'); s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; }
        function openAdminPanel() { document.getElementById('adminModal').classList.remove('hidden'); fetchUsersList(); }
        function closeAdminPanel() { document.getElementById('adminModal').classList.add('hidden'); }
        function logout() { auth.signOut().then(() => location.reload()); }

    </script>
</body>
</html>
