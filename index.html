    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();
        let userRole = 'USER';

        // --- AUTH ---
        firebase.auth().onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                if(user.email === 'ttv4u1@gmail.com') userRole = 'ADMIN';
                await loadProfile(user);
            } else { document.getElementById('landing-screen').style.display = 'flex'; }
        });

        async function loginGoogle() { const provider = new firebase.auth.GoogleAuthProvider(); await firebase.auth().signInWithPopup(provider); }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.data() || {};
            if(d.role === 'ADMIN' || userRole === 'ADMIN') {
                userRole = 'ADMIN';
                document.getElementById('adminBadge').classList.remove('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
            }
            document.getElementById('navAvatar').src = user.photoURL || '';
            document.getElementById('p_name').value = d.name || '';
            document.getElementById('p_gred').value = d.gred || '';
            document.getElementById('p_caw').value = d.cawangan || '';
            if(d.name) document.getElementById('form_staff').value = `${d.name} (${d.gred}) / ${d.cawangan}`.toUpperCase();
        }

        // --- CALCULATIONS ---
        document.addEventListener('input', e => {
            if(e.target.classList.contains('calc-qty')) {
                let total = 0; document.querySelectorAll('.calc-qty').forEach(i => total += Number(i.value || 0));
                document.getElementById('disp_qty').value = total;
            }
            if(e.target.classList.contains('calc-rm')) {
                let rm = 0; document.querySelectorAll('.calc-rm').forEach(i => rm += Number(i.value || 0));
                document.getElementById('disp_rm').value = "RM " + rm.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });

        // --- EXPORT FUNCTIONS (EXCEL & ACCESS) ---
        async function exportToExcel() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                let q = db.collection("reports");
                if(userRole !== 'ADMIN') q = q.where("userID", "==", firebase.auth().currentUser.uid);
                const snap = await q.get();
                const data = snap.docs.map(doc => doc.data());
                
                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Rekod Kes");
                XLSX.writeFile(workbook, `Rekod_Kes_${new Date().toLocaleDateString()}.xlsx`);
            } catch (e) { alert("Ralat Excel: " + e.message); }
            finally { loader.style.display = 'none'; }
        }

        async function exportToAccess() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                let q = db.collection("reports");
                if(userRole !== 'ADMIN') q = q.where("userID", "==", firebase.auth().currentUser.uid);
                const snap = await q.get();
                const items = snap.docs.map(doc => doc.data());
                
                if (items.length === 0) { alert("Tiada data untuk dieksport"); return; }
                
                const replacer = (key, value) => value === null ? '' : value;
                const header = Object.keys(items[0]);
                const csv = [
                    header.join(','),
                    ...items.map(row => header.map(fieldName => JSON.stringify(row[fieldName], replacer)).join(','))
                ].join('\r\n');

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `Eksport_Access_${new Date().getTime()}.csv`);
                a.click();
            } catch (e) { alert("Ralat CSV: " + e.message); }
            finally { loader.style.display = 'none'; }
        }

        // --- SYNC & SUBMIT ---
        async function saveToBaserow(data) {
            try {
                const baserowData = {
                    "BIL": data.BIL, "TAHUN": Number(data.TAHUN) || 2026, "BULAN": data.BULAN,
                    "PENGUATKUASA": data.PENGUATKUASA, "KATEGORI KES": data.KATEGORI_KES,
                    "NO REPOT POLIS": data.NO_REPOT_POLIS, "TARIKH KEJADIAN": data.TARIKH_KEJADIAN,
                    "MASA KEJADIAN": data.MASA_KEJADIAN, "LOKASI KEJADIAN": data.LOKASI_KEJADIAN,
                    "KESALAHAN": data.KESALAHAN, "UNDANG-UNDANG": data.UNDANG_UNDANG,
                    "NO KES IP": data.NO_KES_IP, "JENIS RAMPASAN": data.JENIS_RAMPASAN,
                    "LEMBU": Number(data.LEMBU) || 0, "KERBAU": Number(data.KERBAU) || 0,
                    "KAMBING": Number(data.KAMBING) || 0, "BEBIRI": Number(data.BEBIRI) || 0,
                    "BABI": Number(data.BABI) || 0, "AYAM": Number(data.AYAM) || 0,
                    "KARKAS LEMBU": Number(data.KARKAS_LEMBU) || 0, "KARKAS KERBAU": Number(data.KARKAS_KERBAU) || 0,
                    "KARKAS KAMBING": Number(data.KARKAS_KAMBING) || 0, "KARKAS BABI": Number(data.KARKAS_BABI) || 0,
                    "KARKAS BABI SEJUK BEKU": Number(data.KARKAS_BABI_SEJUK_BEKU) || 0,
                    "KARKAS AYAM": Number(data.KARKAS_AYAM) || 0, "PRODUK SEJUK BEKU ITIK": Number(data.PRODUK_SEJUK_BEKU_ITIK) || 0,
                    "PRODUK SEJUK BEKU BABI": Number(data.PRODUK_SEJUK_BEKU_BABI) || 0,
                    "PRODUK SEJUK BEKU BEBIRI": Number(data.PRODUK_SEJUK_BEKU_BEBIRI) || 0,
                    "PRODUK HAIWAN (TIN)": Number(data.PRODUK_HAIWAN_TIN) || 0, "ANJING": Number(data.ANJING) || 0,
                    "KUCING": Number(data.KUCING) || 0, "ARNAB": Number(data.ARNAB) || 0,
                    "BURUNG": Number(data.BURUNG) || 0, "HAMSTER": Number(data.HAMSTER) || 0,
                    "RAMPASAN LAIN-LAIN": data.RAMPASAN_LAIN, "JUMLAH RAMPASAN": data.JUMLAH_RAMPASAN,
                    "RAMPASAN PENGANGKUTAN": data.RAMPASAN_PENGANGKUTAN,
                    "ANGGARAN NILAI (EKOR/KG)": Number(data.ANGGARAN_NILAI_EKOR_KG) || 0,
                    "ANGGARAN NILAI (KENDERAAN)": Number(data.ANGGARAN_NILAI_KENDERAAN) || 0,
                    "ANGGARAN NILAI (PENGANGKUT/KONTENA)": Number(data.ANGGARAN_NILAI_PENGANGKUT_KONTENA) || 0,
                    "ANGGARAN NILAI (LAIN-LAIN)": Number(data.ANGGARAN_NILAI_LAIN_LAIN) || 0,
                    "JUMLAH NILAI KESELURUHAN": data.JUMLAH_NILAI_KESELURUHAN,
                    "KES SERAHAN": data.KES_SERAHAN, "CATATAN": data.CATATAN
                };
                const response = await fetch(`https://api.baserow.io/api/database/rows/table/${BASEROW_TABLE_ID}/?user_field_names=true`, {
                    method: 'POST',
                    headers: { 'Authorization': `Token ${BASEROW_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(baserowData)
                });
                return response.ok;
            } catch (err) { return false; }
        }

        async function submitData() {
            const loader = document.getElementById('loader');
            const status = document.getElementById('loader-status');
            loader.style.display = 'flex';
            const formData = new FormData(document.getElementById('mainForm'));
            const data = Object.fromEntries(formData.entries());
            data.userID = firebase.auth().currentUser.uid;
            data.timestamp = firebase.firestore.FieldValue.serverTimestamp();
            try {
                status.innerText = "SINKRONISASI FIRESTORE...";
                await db.collection("reports").add(data);
                status.innerText = "SINKRONISASI SPREADSHEET...";
                if(SCRIPT_URL.startsWith('http')) await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                status.innerText = "SINKRONISASI BASEROW v92...";
                await saveToBaserow(data);
                alert("Data Berjaya Disimpan ke Semua Platform Cloud!");
                resetForm();
            } catch (e) { alert("Ralat: " + e.message); } 
            finally { loader.style.display = 'none'; }
        }

        // --- UI UTILS ---
        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center p-10 animate-pulse text-[10px]">MEMANGGIL DATABASE...</p>';
            let q = db.collection("reports");
            if(userRole !== 'ADMIN') q = q.where("userID", "==", firebase.auth().currentUser.uid);
            const snap = await q.get();
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const card = document.createElement('div');
                card.className = "bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm hover:border-indigo-500 transition cursor-pointer active:scale-95";
                card.onclick = () => {
                    const form = document.getElementById('mainForm');
                    Object.keys(d).forEach(key => { if(form.elements[key]) form.elements[key].value = d[key]; });
                    toggleHistory();
                };
                card.innerHTML = `<div class="flex justify-between items-start"><div><p class="text-[9px] font-black text-indigo-600">${d.BIL || '-'}</p><p class="font-bold text-xs uppercase">${d.KATEGORI_KES || 'KES'}</p></div><p class="font-black text-xs text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0'}</p></div>`;
                list.appendChild(card);
            });
        }

        function resetForm() { document.getElementById('mainForm').reset(); document.getElementById('f_tahun').value = 2026; document.getElementById('disp_rm').value = "RM 0.00"; loadProfile(firebase.auth().currentUser); }
        function toggleHistory() { const s = document.getElementById('historySidebar'); s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; if(s.style.left === '0px') fetchHistory(); }
        function toggleProfile() { const s = document.getElementById('profileSidebar'); s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; }
        async function saveProfile() { await db.collection("users").doc(firebase.auth().currentUser.uid).set({ name: document.getElementById('p_name').value.toUpperCase(), gred: document.getElementById('p_gred').value.toUpperCase(), cawangan: document.getElementById('p_caw').value.toUpperCase(), role: userRole }, {merge:true}); alert("Profil dikemaskini!"); location.reload(); }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        
        async function openAdminPanel() {
            document.getElementById('adminModal').classList.remove('hidden');
            const rSnap = await db.collection("reports").get();
            const uSnap = await db.collection("users").get();
            let totalRM = 0;
            rSnap.forEach(doc => { totalRM += Number((doc.data().JUMLAH_NILAI_KESELURUHAN || "0").replace(/[^0-9.-]+/g,"")); });
            document.getElementById('statTotalKes').innerText = rSnap.size;
            document.getElementById('statTotalRM').innerText = "RM " + totalRM.toLocaleString();
            document.getElementById('statTotalUsers').innerText = uSnap.size;
            const list = document.getElementById('adminUserList'); list.innerHTML = '';
            uSnap.forEach(doc => {
                const u = doc.data();
                const row = document.createElement('tr');
                row.className = "border-b";
                row.innerHTML = `<td class="px-6 py-4 font-bold text-xs uppercase">${u.name || 'BARU'}</td><td class="px-6 py-4 text-right"><button onclick="toggleAdmin('${doc.id}','${u.role}')" class="bg-indigo-100 px-3 py-1 rounded text-[10px] font-black">${u.role === 'ADMIN' ? 'BUANG ADMIN' : 'LANTIK ADMIN'}</button></td>`;
                list.appendChild(row);
            });
        }
        async function toggleAdmin(id, role) { await db.collection("users").doc(id).update({role: role === 'ADMIN' ? 'USER' : 'ADMIN'}); openAdminPanel(); }
        function closeAdminPanel() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
</body>
</html>
