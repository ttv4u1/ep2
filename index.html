<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Penguatkuasa v3.0 - Pro Edition</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9; color: #0f172a; 
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes goldShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .premium-gold-btn {
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            color: #451a03;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(251, 191, 36, 0.5);
            animation: goldShimmer 4s linear infinite;
        }
        .version-box {
            display: inline-block;
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            animation: goldShimmer 3s linear infinite;
            color: #451a03; padding: 2px 10px; border-radius: 8px;
            font-weight: 900; font-size: 0.75em; vertical-align: middle;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .section-card {
            background: white; border-radius: 24px; padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0; margin-bottom: 1.5rem;
        }
        .form-input-modern {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 16px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .input-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 6px; display: block; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .section-card { border: 1px solid #eee !important; box-shadow: none !important; break-inside: avoid; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
            .form-input-modern { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0; padding: 2px !important; }
        }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-indigo-600 uppercase text-xs">Sila Tunggu...</p>
    </div>

    <!-- Login -->
    <section id="landing-screen" class="fixed inset-0 z-[3000] flex items-center justify-center bg-[#020617]">
        <div class="p-8 text-center bg-white/5 backdrop-blur-2xl rounded-[40px] border border-white/10 w-[90%] max-w-sm">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">e-Penguatkuasa <span class="version-box">v3.0</span></h1>
            <button onclick="loginGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition mt-8 uppercase text-sm">
                AKSES SISTEM
            </button>
        </div>
    </section>

    <!-- App Content -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700 min-h-screen">
        
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print shadow-sm">
            <div class="w-full px-4 py-3 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center">
                <div class="flex items-center gap-3">
                    <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-8 sm:h-10">
                    <div>
                        <h2 class="text-base sm:text-lg font-black text-slate-800 uppercase leading-none">Borang <span class="version-box">v3.0</span></h2>
                        <p id="realtime-clock" class="text-[9px] sm:text-[10px] font-bold text-indigo-600 mt-1 uppercase"></p>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-1 sm:gap-2 justify-between w-full sm:w-auto">
                    <button onclick="resetForm()" class="px-3 py-2 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px]">Baru</button>
                    <button onclick="toggleHistory()" class="px-3 py-2 bg-amber-500 text-slate-900 rounded-xl font-black uppercase text-[10px]">Rekod</button>
                    <button onclick="exportToExcel()" class="px-3 py-2 bg-emerald-600 text-white rounded-xl font-black uppercase text-[10px]">Excel</button>
                    <button onclick="exportToCSV()" class="px-3 py-2 bg-blue-600 text-white rounded-xl font-black uppercase text-[10px]">Access</button>
                    <button onclick="printReport()" class="px-3 py-2 bg-slate-900 text-white rounded-xl font-black uppercase text-[10px]">Cetak</button>
                    <button onclick="toggleProfile()" class="ml-1 p-1 bg-slate-100 rounded-full border">
                        <img id="navAvatar" src="" class="w-6 h-6 rounded-full object-cover">
                    </button>
                </div>
            </div>
        </header>

        <main class="w-full px-4 sm:px-6 py-6 mx-auto max-w-7xl">
            <form id="mainForm">
                <input type="hidden" id="currentDocId" name="docId">

                <!-- Section A -->
                <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase">A. Maklumat Pengurusan & Kejadian</h3>
                <div class="section-card">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                        <div><label class="input-label">1. Bil</label><input type="text" name="BIL" class="form-input-modern uppercase"></div>
                        <div><label class="input-label">2. Tahun</label><input type="number" name="TAHUN" id="f_tahun" class="form-input-modern"></div>
                        <div><label class="input-label">3. Bulan</label>
                            <select name="BULAN" id="f_bulan" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="lg:col-span-3"><label class="input-label">4. Pegawai Penguatkuasa</label><input type="text" id="form_staff" name="PENGUATKUASA" class="form-input-modern bg-slate-50 uppercase" readonly></div>
                        <div class="lg:col-span-2"><label class="input-label">5. Kategori Kes</label><input type="text" name="KATEGORI_KES" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-2"><label class="input-label">6. No Repot Polis</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern uppercase"></div>
                        <div><label class="input-label">7. Tarikh Kejadian</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div><label class="input-label">8. Masa Kejadian</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                        <div class="lg:col-span-6"><label class="input-label">9. Lokasi Kejadian</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-3"><label class="input-label">10. Kesalahan</label><input type="text" name="KESALAHAN" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-3"><label class="input-label">11. Undang-Undang</label><input type="text" name="UNDANG_UNDANG" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <!-- Section B: Rampasan -->
                <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase">B. Maklumat Rampasan (Ekor/Unit/KG)</h3>
                <div class="section-card">
                    <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
                        <div><label class="input-label">Lembu</label><input type="number" name="LEMBU" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Kerbau</label><input type="number" name="KERBAU" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Kambing</label><input type="number" name="KAMBING" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Bebiri</label><input type="number" name="BEBIRI" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Babi</label><input type="number" name="BABI" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Ayam</label><input type="number" name="AYAM" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Anjing</label><input type="number" name="ANJING" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">Kucing</label><input type="number" name="KUCING" class="form-input-modern" value="0"></div>
                        <div class="lg:col-span-2"><label class="input-label">Lain-lain (Nyatakan)</label><input type="text" name="RAMPASAN_LAIN" class="form-input-modern uppercase" placeholder="JENIS: BILANGAN"></div>
                    </div>
                </div>

                <!-- Section C: Kenderaan & Serahan -->
                <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase">C. Kenderaan & Lokasi Serahan</h3>
                <div class="section-card">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="lg:col-span-2"><label class="input-label">No. Pendaftaran Kenderaan</label><input type="text" name="NO_PENDAFTARAN_KENDERAAN" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-2"><label class="input-label">Jenis/Model Kenderaan</label><input type="text" name="JENIS_KENDERAAN" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-2"><label class="input-label">Kes Diserahkan Kepada</label><input type="text" name="KES_SERAHAN" class="form-input-modern uppercase"></div>
                        <div class="lg:col-span-2"><label class="input-label">Catatan Tambahan</label><input type="text" name="CATATAN" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <!-- Section D: Ringkasan Nilai -->
                <h3 class="text-xs font-black text-indigo-600 mb-4 uppercase">D. Anggaran Nilai (RM)</h3>
                <div class="section-card border-l-[12px] border-indigo-600">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                        <div><label class="input-label">38. Nilai Ekor/KG</label><input type="number" name="ANGGARAN_NILAI_EKOR_KG" class="calc-val form-input-modern" value="0"></div>
                        <div><label class="input-label">39. Nilai Kenderaan</label><input type="number" name="ANGGARAN_NILAI_KENDERAAN" class="calc-val form-input-modern" value="0"></div>
                        <div><label class="input-label">40. Nilai Kontena</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="calc-val form-input-modern" value="0"></div>
                        <div><label class="input-label">41. Nilai Lain</label><input type="number" name="ANGGARAN_NILAI_LAIN_LAIN" class="calc-val form-input-modern" value="0"></div>
                    </div>
                    <div class="mt-6">
                        <label class="input-label">42. Jumlah Nilai Keseluruhan (RM)</label>
                        <input type="text" id="display_total" readonly name="JUMLAH_NILAI_KESELURUHAN" class="form-input-modern font-black text-2xl border-none bg-transparent text-indigo-700" value="RM 0.00">
                    </div>
                    <div class="mt-8 no-print flex justify-center">
                        <button type="button" onclick="saveData()" class="w-full sm:w-auto px-12 py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition active:scale-95">Simpan Rekod v3.0</button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- DB SIDEBAR -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-lg h-full bg-slate-50 z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto no-print p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase tracking-tighter">Database <span class="version-box">v3.0</span></h2>
            <button onclick="toggleHistory()" class="p-2 bg-white rounded-full border shadow-sm"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="space-y-4"></div>
    </aside>

    <!-- PROFILE SIDEBAR -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8 no-print border-l">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl uppercase tracking-tighter">Profil Pegawai</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="input-label">Nama Penuh</label><input type="text" id="userName" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred Jabatan</label><input type="text" id="userGred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Negeri / Cawangan</label><input type="text" id="userCawangan" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-indigo-700 transition">Kemaskini Profil</button>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-4">Log Keluar</button>
        </div>
    </aside>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        // AUTH STATE
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('app-content').style.opacity = "1";
                await loadProfile(user);
                updateClock();
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await firebase.auth().signInWithPopup(provider); } catch (e) { alert(e.message); }
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.exists ? doc.data() : {};
            document.getElementById('navAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=P`;
            document.getElementById('userName').value = d.name || '';
            document.getElementById('userGred').value = d.gred || '';
            document.getElementById('userCawangan').value = d.cawangan || '';
            if(d.name) document.getElementById('form_staff').value = `${d.name} (${d.gred}) / ${d.cawangan}`.toUpperCase();
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const data = {
                name: document.getElementById('userName').value.toUpperCase(),
                gred: document.getElementById('userGred').value.toUpperCase(),
                cawangan: document.getElementById('userCawangan').value.toUpperCase()
            };
            await db.collection("users").doc(user.uid).set(data, { merge: true });
            alert("Profil dikemaskini!");
            location.reload();
        }

        // CALC TOTAL
        document.querySelectorAll('.calc-val').forEach(input => {
            input.addEventListener('input', () => {
                let total = 0;
                document.querySelectorAll('.calc-val').forEach(i => total += Number(i.value || 0));
                document.getElementById('display_total').value = "RM " + total.toLocaleString(undefined, {minimumFractionDigits: 2});
            });
        });

        // SAVE DATA
        async function saveData() {
            document.getElementById('loader').style.display = 'flex';
            const form = document.getElementById('mainForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            data.userId = firebase.auth().currentUser.uid;

            try {
                if (data.docId) {
                    await db.collection("reports").doc(data.docId).update(data);
                } else {
                    delete data.docId;
                    await db.collection("reports").add(data);
                }
                alert("Data berjaya disimpan!");
                resetForm();
            } catch (e) {
                alert("Ralat: " + e.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // RESET FORM (TAMBAH BARU)
        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('currentDocId').value = "";
            document.getElementById('display_total').value = "RM 0.00";
            // Set default year
            document.getElementById('f_tahun').value = new Date().getFullYear();
            loadProfile(firebase.auth().currentUser);
        }

        // FETCH HISTORY
        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-10 font-bold animate-pulse">Memuatkan data...</p>';
            const snapshot = await db.collection("reports").orderBy("updatedAt", "desc").limit(20).get();
            
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl border shadow-sm hover:border-indigo-500 cursor-pointer transition";
                card.onclick = () => loadDocument(doc.id, d);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-indigo-600 uppercase">${d.BIL || 'TIADA BIL'}</p>
                            <h4 class="font-bold text-slate-800 uppercase text-sm">${d.LOKASI_KEJADIAN || 'TIADA LOKASI'}</h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${d.TARIKH_KEJADIAN} | ${d.JUMLAH_NILAI_KESELURUHAN}</p>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function loadDocument(id, data) {
            const form = document.getElementById('mainForm');
            for (let key in data) {
                if (form.elements[key]) form.elements[key].value = data[key];
            }
            document.getElementById('currentDocId').value = id;
            document.getElementById('display_total').value = data.JUMLAH_NILAI_KESELURUHAN;
            toggleHistory();
        }

        // EXPORT TO EXCEL
        async function exportToExcel() {
            const snapshot = await db.collection("reports").get();
            const data = snapshot.docs.map(doc => {
                const d = doc.data();
                delete d.updatedAt; delete d.userId;
                return d;
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekod");
            XLSX.writeFile(wb, `e-Penguatkuasa_Export_${new Date().getTime()}.xlsx`);
        }

        // EXPORT TO ACCESS (CSV)
        async function exportToCSV() {
            const snapshot = await db.collection("reports").get();
            const data = snapshot.docs.map(doc => {
                const d = doc.data();
                delete d.updatedAt; delete d.userId;
                return d;
            });
            if(data.length === 0) return alert("Tiada data untuk dieksport");
            
            const headers = Object.keys(data[0]);
            const csvContent = [
                headers.join(","),
                ...data.map(row => headers.map(h => `"${row[h] || ''}"`).join(","))
            ].join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Data_Access_Import.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // PRINT
        function printReport() {
            window.print();
        }

        // UTILS
        function updateClock() {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; 
            if(s.style.left === '0px') fetchHistory(); 
        }
        function toggleProfile() { 
            const s = document.getElementById('profileSidebar'); 
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; 
        }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
