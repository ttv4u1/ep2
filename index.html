<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Penguatkuasa v84 - Titanium</title>
    
    <link rel="icon" type="image/png" href="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; }
        .version-box { background: linear-gradient(45deg, #b45309, #fbbf24); color: #451a03; padding: 2px 10px; border-radius: 8px; font-weight: 900; font-size: 0.75em; }
        .form-input-modern { width: 100%; padding: 10px 14px; border-radius: 12px; border: 2px solid #cbd5e1; font-weight: 700; font-size: 14px; background: white; }
        .input-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .section-card { background: white; border-radius: 24px; padding: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Tab Colors */
        .btn-baru { background: #4f46e5; color: white; }
        .btn-rekod { background: #f59e0b; color: white; }
        .btn-cetak { background: #0f172a; color: white; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-indigo-600 uppercase text-[10px] tracking-widest">SINKRONISASI DATA v84...</p>
    </div>

    <!-- Login -->
    <section id="landing-screen" class="fixed inset-0 z-[3000] flex items-center justify-center bg-[#020617]">
        <div class="p-8 text-center bg-white/5 backdrop-blur-xl rounded-[40px] border border-white/10 w-[90%] max-w-sm">
            <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-white mb-2 uppercase italic tracking-tighter">e-Penguatkuasa <span class="version-box">v84</span></h1>
            <p class="text-slate-400 text-[10px] mb-8 uppercase font-bold tracking-widest">Titanium Sync Edition</p>
            <button onclick="loginGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition uppercase text-sm">Masuk Sistem</button>
        </div>
    </section>

    <!-- Content -->
    <div id="app-content" class="hidden min-h-screen">
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center no-print">
            <div class="flex items-center gap-2">
                <img src="https://github.com/ttv4u1/KP/raw/main/Logo%20Penguatkuasa.png" class="h-8">
                <h2 class="font-black text-slate-800 text-xs uppercase">BORANG <span class="version-box">V84</span></h2>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="resetForm()" class="btn-baru px-4 py-2 rounded-xl font-black text-[11px] uppercase shadow-md">Baru</button>
                <button onclick="toggleHistory()" class="btn-rekod px-4 py-2 rounded-xl font-black text-[11px] uppercase shadow-md">Rekod</button>
                <button onclick="window.print()" class="btn-cetak px-4 py-2 rounded-xl font-black text-[11px] uppercase shadow-md">Cetak</button>
                <div onclick="toggleProfile()" class="w-9 h-9 rounded-full border-2 border-indigo-500 overflow-hidden cursor-pointer bg-white shadow-sm">
                    <img id="navAvatar" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <main class="p-4 max-w-7xl mx-auto">
            <form id="mainForm">
                <!-- A. MAKLUMAT KES -->
                <div class="section-card">
                    <h3 class="text-[11px] font-black text-indigo-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="folder-kanban" class="w-4 h-4"></i> A. Maklumat Pengurusan & Kejadian
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                        <div class="col-span-1"><label class="input-label">1. Bil</label><input type="text" name="BIL" class="form-input-modern uppercase" placeholder="001/2026"></div>
                        <div class="col-span-1"><label class="input-label">2. Tahun</label><input type="number" name="TAHUN" id="f_tahun" class="form-input-modern"></div>
                        <div class="col-span-1"><label class="input-label">3. Bulan</label>
                            <select name="BULAN" id="f_bulan" class="form-input-modern">
                                <option>JANUARI</option><option>FEBRUARI</option><option>MAC</option><option>APRIL</option>
                                <option>MEI</option><option>JUN</option><option>JULAI</option><option>OGOS</option>
                                <option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DISEMBER</option>
                            </select>
                        </div>
                        <div class="col-span-2 md:col-span-3"><label class="input-label">4. Pegawai Penguatkuasa</label><input type="text" id="form_staff" name="PENGUATKUASA" class="form-input-modern bg-slate-50 uppercase" readonly></div>
                        <div class="col-span-2"><label class="input-label">5. Kategori Kes</label><input type="text" name="KATEGORI_KES" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">6. No Repot Polis</label><input type="text" name="NO_REPOT_POLIS" class="form-input-modern uppercase"></div>
                        <div class="col-span-1"><label class="input-label">7. Tarikh Kejadian</label><input type="date" name="TARIKH_KEJADIAN" class="form-input-modern"></div>
                        <div class="col-span-1"><label class="input-label">8. Masa Kejadian</label><input type="time" name="MASA_KEJADIAN" class="form-input-modern"></div>
                        <div class="col-span-2 md:col-span-3"><label class="input-label">9. Lokasi Kejadian</label><input type="text" name="LOKASI_KEJADIAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-2 md:col-span-3"><label class="input-label">10. Kesalahan</label><input type="text" name="KESALAHAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-2 md:col-span-4"><label class="input-label">11. Undang-Undang</label><input type="text" name="UNDANG_UNDANG" class="form-input-modern uppercase"></div>
                        <div class="col-span-2 md:col-span-2"><label class="input-label">12. No Kes IP</label><input type="text" name="NO_KES_IP" class="form-input-modern uppercase"></div>
                        <div class="col-span-2"><label class="input-label">13. Jenis Rampasan</label><input type="text" name="JENIS_RAMPASAN" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <!-- B. HAIWAN HIDUP -->
                <div class="section-card">
                    <h3 class="text-[11px] font-black text-emerald-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="dog" class="w-4 h-4"></i> B. Rampasan Haiwan Hidup (Ekor)
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div><label class="input-label">LEMBU</label><input type="number" name="LEMBU" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KERBAU</label><input type="number" name="KERBAU" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KAMBING</label><input type="number" name="KAMBING" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BEBIRI</label><input type="number" name="BEBIRI" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BABI</label><input type="number" name="BABI" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">AYAM</label><input type="number" name="AYAM" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ANJING</label><input type="number" name="ANJING" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KUCING</label><input type="number" name="KUCING" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ARNAB</label><input type="number" name="ARNAB" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BURUNG</label><input type="number" name="BURUNG" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">HAMSTER</label><input type="number" name="HAMSTER" class="calc-qty form-input-modern" value="0"></div>
                    </div>
                </div>

                <!-- C. KARKAS & PRODUK -->
                <div class="section-card">
                    <h3 class="text-[11px] font-black text-amber-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="package" class="w-4 h-4"></i> C. Rampasan Karkas & Produk
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div><label class="input-label">KARKAS LEMBU</label><input type="number" name="KARKAS_LEMBU" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS KERBAU</label><input type="number" name="KARKAS_KERBAU" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS KAMBING</label><input type="number" name="KARKAS_KAMBING" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS BABI</label><input type="number" name="KARKAS_BABI" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">KARKAS AYAM</label><input type="number" name="KARKAS_AYAM" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">K. BABI (FROZEN)</label><input type="number" name="KARKAS_BABI_SEJUK_BEKU" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">ITIK (FROZEN)</label><input type="number" name="PRODUK_SEJUK_BEKU_ITIK" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BABI (FROZEN)</label><input type="number" name="PRODUK_SEJUK_BEKU_BABI" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">BEBIRI (FROZEN)</label><input type="number" name="PRODUK_SEJUK_BEKU_BEBIRI" class="calc-qty form-input-modern" value="0"></div>
                        <div><label class="input-label">PRODUK TIN</label><input type="number" name="PRODUK_HAIWAN_TIN" class="calc-qty form-input-modern" value="0"></div>
                        <div class="col-span-2"><label class="input-label">LAIN-LAIN RAMPASAN</label><input type="text" name="RAMPASAN_LAIN" class="form-input-modern uppercase"></div>
                    </div>
                </div>

                <!-- D. NILAI & RINGKASAN -->
                <div class="section-card border-l-[12px] border-indigo-600">
                    <h3 class="text-[11px] font-black text-slate-800 mb-4 uppercase tracking-wider">D. Anggaran Nilai & Ringkasan</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="col-span-2"><label class="input-label">JUMLAH RAMPASAN (EKOR/KG/UNIT)</label><input type="text" id="disp_qty" name="JUMLAH_RAMPASAN" class="form-input-modern bg-indigo-50 font-bold" readonly value="0"></div>
                        <div class="col-span-2"><label class="input-label">RAMPASAN PENGANGKUTAN</label><input type="text" name="RAMPASAN_PENGANGKUTAN" class="form-input-modern uppercase" placeholder="NO PENDAFTARAN KENDERAAN"></div>
                        
                        <div><label class="input-label">NILAI EKOR/KG (RM)</label><input type="number" name="ANGGARAN_NILAI_EKOR_KG" class="calc-rm form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI KENDERAAN (RM)</label><input type="number" name="ANGGARAN_NILAI_KENDERAAN" class="calc-rm form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI KONTENA (RM)</label><input type="number" name="ANGGARAN_NILAI_PENGANGKUT_KONTENA" class="calc-rm form-input-modern" value="0"></div>
                        <div><label class="input-label">NILAI LAIN-LAIN (RM)</label><input type="number" name="ANGGARAN_NILAI_LAIN_LAIN" class="calc-rm form-input-modern" value="0"></div>
                        
                        <div class="col-span-2"><label class="input-label">JUMLAH NILAI KESELURUHAN (RM)</label><input type="text" id="disp_rm" name="JUMLAH_NILAI_KESELURUHAN" class="form-input-modern text-2xl font-black text-indigo-700 bg-transparent border-none" readonly value="RM 0.00"></div>
                        <div class="col-span-2"><label class="input-label">KES SERAHAN</label><input type="text" name="KES_SERAHAN" class="form-input-modern uppercase"></div>
                        <div class="col-span-4"><label class="input-label">CATATAN</label><input type="text" name="CATATAN" class="form-input-modern uppercase"></div>
                    </div>
                    
                    <div class="mt-8 no-print">
                        <button type="button" onclick="submitData()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-2xl hover:bg-indigo-700 transition active:scale-95 uppercase tracking-widest text-sm">
                            Hantar & Simpan Rekod Titanium
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- SIDEBAR DATABASE -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-md h-full bg-white z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto no-print">
        <div class="sticky top-0 bg-white p-6 border-b flex justify-between items-center">
            <h2 class="font-black text-xl uppercase italic">DATABASE <span class="text-indigo-600">REKOD</span></h2>
            <button onclick="toggleHistory()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="p-4 space-y-3">
            <!-- Data Masuk Sini -->
        </div>
    </aside>

    <!-- SIDEBAR PROFIL -->
    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8 no-print">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl uppercase italic">Profil Pegawai</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-4">
            <div id="adminBadge" class="hidden bg-red-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest mb-4">SUPER ADMIN</div>
            <div><label class="input-label">Nama Penuh</label><input type="text" id="p_name" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Gred Jawatan</label><input type="text" id="p_gred" class="form-input-modern uppercase"></div>
            <div><label class="input-label">Cawangan/Negeri</label><input type="text" id="p_caw" class="form-input-modern uppercase"></div>
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase shadow-lg">Kemaskini Profil</button>
            <div id="adminControls" class="hidden pt-6 border-t mt-6">
                <button onclick="window.open('https://console.firebase.google.com/')" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl uppercase text-[10px] mb-2">Firestore Console</button>
            </div>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs uppercase mt-8 text-center">LOG KELUAR</button>
        </div>
    </aside>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let userRole = 'USER';

        // AUTH
        firebase.auth().onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                
                // Super Admin Override
                if(user.email === 'ttv4u1@gmail.com') {
                    userRole = 'ADMIN';
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.getElementById('adminControls').classList.remove('hidden');
                }
                
                await loadProfile(user);
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
        }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.data() || {};
            document.getElementById('navAvatar').src = user.photoURL || '';
            document.getElementById('p_name').value = d.name || '';
            document.getElementById('p_gred').value = d.gred || '';
            document.getElementById('p_caw').value = d.cawangan || '';
            if(d.name) document.getElementById('form_staff').value = `${d.name} (${d.gred}) / ${d.cawangan}`.toUpperCase();
        }

        // DATABASE FETCH (FIXED)
        function toggleHistory() {
            const s = document.getElementById('historySidebar');
            s.style.left = (s.style.left === '0px') ? '-100%' : '0px';
            if(s.style.left === '0px') fetchHistory();
        }

        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center p-10 animate-pulse text-[10px] font-bold">MENGHUBUNGKAN KE DATABASE...</p>';
            
            try {
                let query = db.collection("reports");
                
                // Jika bukan admin, hanya tunjuk rekod sendiri
                if(userRole !== 'ADMIN') {
                    query = query.where("userID", "==", firebase.auth().currentUser.uid);
                }

                // Kita buang orderBy dahulu untuk elakkan ralat Missing Index
                const snap = await query.get();
                
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center p-10 font-bold text-slate-400 uppercase text-[10px]">TIADA REKOD DIJUMPAI</div>';
                    return;
                }

                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-50 p-4 rounded-2xl border border-slate-200 hover:border-indigo-500 transition cursor-pointer";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[9px] font-black text-indigo-600 uppercase">${d.BIL || 'BIL -'}</p>
                                <p class="font-bold text-xs uppercase mt-1">${d.KATEGORI_KES || 'KES'}</p>
                                <p class="text-[9px] text-slate-500 mt-1 uppercase">${d.PENGUATKUASA}</p>
                            </div>
                            <p class="font-black text-xs text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0'}</p>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = `<div class="p-4 text-red-500 text-[10px] font-bold">RALAT: ${e.message}</div>`;
            }
        }

        // CALCULATIONS
        document.addEventListener('input', e => {
            if(e.target.classList.contains('calc-qty')) {
                let total = 0;
                document.querySelectorAll('.calc-qty').forEach(i => total += Number(i.value || 0));
                document.getElementById('disp_qty').value = total;
            }
            if(e.target.classList.contains('calc-rm')) {
                let totalRM = 0;
                document.querySelectorAll('.calc-rm').forEach(i => totalRM += Number(i.value || 0));
                document.getElementById('disp_rm').value = "RM " + totalRM.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });

        // SUBMISSION
        async function submitData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            const formData = new FormData(document.getElementById('mainForm'));
            const data = Object.fromEntries(formData.entries());
            data.userID = firebase.auth().currentUser.uid;
            data.server_timestamp = firebase.firestore.FieldValue.serverTimestamp();

            try {
                // 1. Firestore
                await db.collection("reports").add(data);
                
                // 2. Spreadsheet
                if(SCRIPT_URL.startsWith('http')) {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }

                alert("BERJAYA: Data diselaraskan ke Cloud & Spreadsheet!");
                resetForm();
            } catch (e) {
                alert("RALAT SIMPAN: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('f_tahun').value = new Date().getFullYear();
            document.getElementById('disp_rm').value = "RM 0.00";
            loadProfile(firebase.auth().currentUser);
        }

        function toggleProfile() {
            const s = document.getElementById('profileSidebar');
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px';
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            await db.collection("users").doc(user.uid).set({
                name: document.getElementById('p_name').value.toUpperCase(),
                gred: document.getElementById('p_gred').value.toUpperCase(),
                cawangan: document.getElementById('p_caw').value.toUpperCase(),
                role: userRole
            }, {merge:true});
            alert("Profil dikemaskini!");
            location.reload();
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        document.getElementById('f_tahun').value = new Date().getFullYear();
    </script>
</body>
</html>
