    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9; color: #0f172a; 
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        
        @keyframes goldShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .premium-gold-btn {
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            color: #451a03;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(251, 191, 36, 0.5);
            animation: goldShimmer 4s linear infinite;
        }

        .version-box {
            display: inline-block;
            background: linear-gradient(45deg, #b45309, #f59e0b, #fbbf24, #f59e0b, #b45309);
            background-size: 200% auto;
            animation: goldShimmer 3s linear infinite;
            color: #451a03; 
            padding: 2px 10px; 
            border-radius: 8px;
            font-weight: 900; 
            font-size: 0.75em; 
            vertical-align: middle;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
            border: 1px solid rgba(251, 191, 36, 0.6);
            text-transform: uppercase;
        }

        .section-card {
            background: white; border-radius: 24px; padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0; margin-bottom: 1.5rem;
        }

        .form-input-modern {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e1;
            background: #ffffff; font-weight: 700; font-size: 15px; transition: all 0.2s; color: #1e293b;
        }
        .form-input-modern::placeholder { color: #94a3b8; font-weight: 400; font-style: italic; font-size: 13px; }
        .form-input-modern:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .input-label {
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; 
            margin-bottom: 6px; display: block; letter-spacing: 0.05em;
        }

        .animal-grid-item { background: #f8fafc; padding: 10px; border-radius: 16px; border: 1px solid #e2e8f0; }

        @media print {
            @page { size: A4 portrait; margin: 0.4cm; }
            .no-print { display: none !important; }
            .section-card { border: none !important; box-shadow: none !important; padding: 0 !important; margin-bottom: 10px !important; }
            .print-section-title { display: block !important; border-bottom: 2px solid black; margin-top: 10px; font-weight: 900; }
            .form-input-modern { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0 !important; padding: 2px 0 !important; }
        }

        .print-section-title, #print-header, .sig-area { display: none; }
        #loader { display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }

                updateClock();
            } else {
                document.getElementById('landing-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const d = doc.exists ? doc.data() : {};
            const isAdmin = (d.role === 'ADMIN' || user.email === 'ttv4u1@gmail.com');
            
            userMeta = { name: d.name || '', gred: d.gred || '', cawangan: d.cawangan || '', role: isAdmin ? 'ADMIN' : 'USER' };
            
            document.getElementById('navAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${userMeta.name}`;
            document.getElementById('userName').value = userMeta.name;
            document.getElementById('userGred').value = userMeta.gred;
            document.getElementById('userCawangan').value = userMeta.cawangan;
            document.getElementById('adminBadge').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminControls').classList.toggle('hidden', !isAdmin);
            
            if(userMeta.name) {
                document.getElementById('form_staff').value = `${userMeta.name} (${userMeta.gred}) / ${userMeta.cawangan}`.toUpperCase();
            }
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const data = { 
                name: document.getElementById('userName').value.toUpperCase(),
                gred: document.getElementById('userGred').value.toUpperCase(),
                cawangan: document.getElementById('userCawangan').value.toUpperCase()
            };
            await db.collection("users").doc(user.uid).set(data, { merge: true });
            alert("Profil Dikemaskini!");
            location.reload();
        }

        // CRUD
        async function saveToAll() {
            const user = firebase.auth().currentUser;
            if(!userMeta.name) { alert("Lengkapkan profil dahulu!"); toggleProfile(); return; }

            document.getElementById('loader').style.display = 'flex';
            const formData = new FormData(document.getElementById('mainForm'));
            const dataObj = Object.fromEntries(formData.entries());
            dataObj.userId = user.uid;
            dataObj.recordedBy = userMeta.name;
            dataObj.updatedAt = firebase.firestore.FieldValue.serverTimestamp();

            try {
                await db.collection("reports").add(dataObj);
                fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataObj) });
                alert("Rekod Berjaya Disimpan!");
                resetForm();
            } catch (e) { alert(e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function fetchHistory() {
            const user = firebase.auth().currentUser;
            const listDiv = document.getElementById('historyList');
            listDiv.innerHTML = '<p class="text-center py-10 text-xs">Menarik Rekod...</p>';
            
            let query = (userMeta.role === 'ADMIN') ? db.collection("reports") : db.collection("reports").where("userId", "==", user.uid);
            const snapshot = await query.orderBy("updatedAt", "desc").limit(20).get();
            listDiv.innerHTML = "";
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl border-l-8 border-indigo-600 shadow-sm cursor-pointer";
                card.onclick = () => loadRecordToForm(doc.id);
                card.innerHTML = `
                    <div class="flex justify-between text-[10px] font-black"><span>BIL: ${d.BIL || '-'}</span><span class="text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || 'RM 0.00'}</span></div>
                    <p class="text-[10px] mt-1 font-bold">${d.LOKASI_KEJADIAN || 'TIADA LOKASI'}</p>
                    <p class="text-[8px] text-slate-500 mt-1 uppercase">${d.recordedBy || ''}</p>
                `;
                listDiv.appendChild(card);
            });
        }

        async function loadRecordToForm(id) {
            const doc = await db.collection("reports").doc(id).get();
            const d = doc.data();
            document.getElementById('currentDocId').value = id;
            Object.keys(d).forEach(k => {
                let input = document.querySelector(`[name="${k}"]`);
                if (input) input.value = d[k];
            });
            calcTotal();
            toggleHistory();
        }

        // UTILS
        function calcTotal() {
            let sum = 0;
            document.querySelectorAll('.calc').forEach(i => sum += Number(i.value || 0));
            document.getElementById('total_val_web').value = "RM " + sum.toLocaleString('en-MY', {minimumFractionDigits: 2});
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            const d = new Date();
            document.getElementById('f_tahun').value = d.getFullYear();
            document.getElementById('f_bulan').selectedIndex = d.getMonth();
            calcTotal();
        }

        function toggleHistory() { 
            const s = document.getElementById('historySidebar'); 
            s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; 
            if(s.style.left === '0px') fetchHistory();
        }

        function toggleProfile() { 
            const s = document.getElementById('profileSidebar'); 
            s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; 
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleString('ms-MY').toUpperCase();
        }
        setInterval(updateClock, 1000);

        function printReport() { calcTotal(); window.print(); }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet([Object.fromEntries(new FormData(document.getElementById('mainForm')).entries())]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, "ePenguatkuasa_v2.2.xlsx");
        }

        document.getElementById('mainForm').addEventListener('input', calcTotal);
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        function openAdminPanel() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdminPanel() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
</body>
</html>
