                        <div><label class="input-label">BABI (FROZEN)</label><input type="number" name="PRODUK_SEJUK_BEKU_BABI" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">PRODUK TIN</label><input type="number" name="PRODUK_HAIWAN_TIN" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">ANJING</label><input type="number" name="ANJING" class="form-input-modern" value="0"></div>
                        <div><label class="input-label">KUCING</label><input type="number" name="KUCING" class="form-input-modern" value="0"></div>

                <!-- BAHAGIAN C (36-44) -->

                        <div><label class="input-label">Bil Kontena</label><input type="number" name="JUMLAH_RAMPASAN_PENGANGKUT_KONTENA" class="form-input-modern" value="0"></div>

                <div class="p-4 no-print sticky bottom-4 z-30">
                    <button type="button" id="btnSubmit" onclick="submitData()" class="premium-gold-btn w-full py-5 rounded-3xl shadow-2xl uppercase text-sm font-black">SIMPAN DATA DATABASE GLOBAL</button>
                </div>
            </form>

    <!-- Sidebar Database Global -->
    <aside id="historySidebar" class="fixed top-0 left-[-100%] w-full max-w-md h-full bg-white z-[2500] shadow-2xl transition-all duration-500 overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <div><h2 class="font-black text-xl italic uppercase">Database Global</h2><p class="text-[9px] font-bold text-slate-400">Live & Excel Records</p></div>
            <button onclick="toggleHistory()" class="p-2 bg-white rounded-full border shadow-sm"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="p-4 space-y-3"></div>
    </aside>

    <aside id="profileSidebar" class="fixed top-0 right-[-100%] w-full max-w-sm h-full bg-white z-[2500] shadow-2xl transition-all duration-500 p-8">
        <div class="flex justify-between items-center mb-8"><h2 class="font-black text-xl italic uppercase">Profil</h2><button onclick="toggleProfile()"><i data-lucide="x"></i></button></div>
        <div id="adminControls" class="hidden"><button onclick="alert('Admin Panel')" class="premium-gold-btn w-full py-4 rounded-xl uppercase mb-4">Admin Control</button></div>
        <button onclick="logout()" class="w-full text-red-500 font-bold uppercase mt-12">Log Keluar</button>
    </aside>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYZYxkvYipLPvvdk_j8Srprz_ioCAtmkibQLtadnOZkbRZ3L2j-4SFk1sCpqH9M-qmEw/exec'; 
        const BASEROW_TOKEN = '7OPuNqPLqPtdkykdydfGSHaXReA00BQU';
        const BASEROW_TABLE_ID = '947317';

        const firebaseConfig = {
            apiKey: "AIzaSyD5rx8TQdkFLzmunEmVtwt56Y8Mlt9Zsvo",
            authDomain: "e-penguatkuasa-jpv.firebaseapp.com",
            projectId: "e-penguatkuasa-jpv",
            storageBucket: "e-penguatkuasa-jpv.firebasestorage.app",
            messagingSenderId: "790915728070",
            appId: "1:790915728070:web:d2759cc670024001218dc7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRole = 'USER';

        // Mapping Data dari Excel/Firestore Key ke Form Name
        const fieldMapping = {
            "KATEGORI KES": "KATEGORI_KES",
            "NO REPOT POLIS": "NO_REPOT_POLIS",
            "TARIKH KEJADIAN": "TARIKH_KEJADIAN",
            "MASA KEJADIAN": "MASA_KEJADIAN",
            "LOKASI KEJADIAN": "LOKASI_KEJADIAN",
            "UNDANG-UNDANG": "UNDANG_UNDANG",
            "NO KES IP": "NO_KES_IP",
            "JENIS RAMPASAN": "JENIS_RAMPASAN",
            "KARKAS BABI SEJUK BEKU": "KARKAS_BABI_SEJUK_BEKU",
            "PRODUK SEJUK BEKU ITIK": "PRODUK_SEJUK_BEKU_ITIK",
            "PRODUK SEJUK BEKU AYAM": "PRODUK_SEJUK_BEKU_AYAM",
            "PRODUK SEJUK BEKU BABI": "PRODUK_SEJUK_BEKU_BABI",
            "PRODUK HAIWAN (TIN)": "PRODUK_HAIWAN_TIN",
            "RAMPASAN LAIN-LAIN": "RAMPASAN_LAIN",
            "JUMLAH RAMPASAN KENDERAAN": "JUMLAH_RAMPASAN_KENDERAAN",
            "JUMLAH RAMPASAN PENGANGKUT/KONTENA": "JUMLAH_RAMPASAN_PENGANGKUT_KONTENA",
            "ANGGARAN NILAI (EKOR/KG)": "ANGGARAN_NILAI_EKOR_KG",
            "ANGGARAN NILAI (KENDERAAN)": "ANGGARAN_NILAI_KENDERAAN",
            "ANGGARAN NILAI (PENGANGKUT/KONTENA)": "ANGGARAN_NILAI_PENGANGKUT_KONTENA",
            "ANGGARAN NILAI (LAIN-LAIN)": "ANGGARAN_NILAI_LAIN_LAIN",
            "JUMLAH NILAI KESELURUHAN": "JUMLAH_NILAI_KESELURUHAN",
            "KES SERAHAN": "KES_SERAHAN"
        };

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('landing-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('navAvatar').src = user.photoURL;
                if(['ttv4u1@gmail.com', 'roland@dvs.gov.my'].includes(user.email)) {
                    userRole = 'ADMIN';
                    document.getElementById('adminControls').classList.remove('hidden');
                }
                loadProfile(user);
            }
        });

        async function loginGoogle() { const p = new firebase.auth.GoogleAuthProvider(); await firebase.auth().signInWithPopup(p); }

        async function loadProfile(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('form_staff').value = `${d.name} / ${d.cawangan}`.toUpperCase();
            }
        }

        async function submitData() {
            const loader = document.getElementById('loader'); loader.style.display = 'flex';
            const formData = new FormData(document.getElementById('mainForm'));
            const data = Object.fromEntries(formData.entries());
            const docId = document.getElementById('currentDocId').value;
            const source = document.getElementById('currentSource').value;

            try {
                if(docId) {
                    await db.collection(source).doc(docId).update(data);
                    alert("Rekod Dikemaskini!");
                } else {
                    data.timestamp = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("reports").add(data);
                    alert("Rekod Baru Disimpan!");
                }
                
                // Real-time Sync to Spreadsheet & Baserow
                await syncExternal(data);
                resetForm();
            } catch (e) { alert(e.message); }
            finally { loader.style.display = 'none'; }
        }

        async function syncExternal(data) {
            // Prep data for Baserow/Sheets (44 Kolum Order)
            const syncData = {
                "BIL": data.BIL, "TAHUN": data.TAHUN, "BULAN": data.BULAN, "PENGUATKUASA": data.PENGUATKUASA,
                "KATEGORI KES": data.KATEGORI_KES, "NO REPOT POLIS": data.NO_REPOT_POLIS, "TARIKH KEJADIAN": data.TARIKH_KEJADIAN,
                "MASA KEJADIAN": data.MASA_KEJADIAN, "LOKASI KEJADIAN": data.LOKASI_KEJADIAN, "KESALAHAN": data.KESALAHAN,
                "UNDANG-UNDANG": data.UNDANG_UNDANG, "NO KES IP": data.NO_KES_IP, "JENIS RAMPASAN": data.JENIS_RAMPASAN,
                "LEMBU": Number(data.LEMBU), "KERBAU": Number(data.KERBAU), "KAMBING": Number(data.KAMBING),
                "BEBIRI": Number(data.BEBIRI), "BABI": Number(data.BABI), "AYAM": Number(data.AYAM),
                "KARKAS LEMBU": Number(data.KARKAS_LEMBU), "KARKAS KERBAU": Number(data.KARKAS_KERBAU),
                "KARKAS KAMBING": Number(data.KARKAS_KAMBING), "KARKAS BABI": Number(data.KARKAS_BABI),
                "KARKAS BABI SEJUK BEKU": Number(data.KARKAS_BABI_SEJUK_BEKU), "KARKAS AYAM": Number(data.KARKAS_AYAM),
                "PRODUK SEJUK BEKU ITIK": Number(data.PRODUK_SEJUK_BEKU_ITIK), "PRODUK SEJUK BEKU AYAM": Number(data.PRODUK_SEJUK_BEKU_AYAM),
                "PRODUK SEJUK BEKU BABI": Number(data.PRODUK_SEJUK_BEKU_BABI), "PRODUK HAIWAN (TIN)": Number(data.PRODUK_HAIWAN_TIN),
                "ANJING": Number(data.ANJING), "KUCING": Number(data.KUCING), "ARNAB": Number(data.ARNAB),
                "BURUNG": Number(data.BURUNG), "HAMSTER": Number(data.HAMSTER), "RAMPASAN LAIN-LAIN": data.RAMPASAN_LAIN,
                "JUMLAH RAMPASAN KENDERAAN": Number(data.JUMLAH_RAMPASAN_KENDERAAN), "JUMLAH RAMPASAN PENGANGKUT/KONTENA": Number(data.JUMLAH_RAMPASAN_PENGANGKUT_KONTENA),
                "ANGGARAN NILAI (EKOR/KG)": data.ANGGARAN_NILAI_EKOR_KG, "ANGGARAN NILAI (KENDERAAN)": data.ANGGARAN_NILAI_KENDERAAN,
                "ANGGARAN NILAI (PENGANGKUT/KONTENA)": data.ANGGARAN_NILAI_PENGANGKUT_KONTENA, "ANGGARAN NILAI (LAIN-LAIN)": data.ANGGARAN_NILAI_LAIN_LAIN,
                "JUMLAH NILAI KESELURUHAN": data.JUMLAH_NILAI_KESELURUHAN, "KES SERAHAN": data.KES_SERAHAN, "CATATAN": data.CATATAN
            };

            // 1. Google Sheets
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(syncData) });

            // 2. Baserow
            try {
                await fetch(`https://api.baserow.io/api/database/rows/table/${BASEROW_TABLE_ID}/?user_field_names=true`, {
                    method: 'POST',
                    headers: { 'Authorization': `Token ${BASEROW_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(syncData)
                });
            } catch(e) {}
        }

        async function fetchHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center font-bold animate-pulse p-10">MENGAMBIL DATA GLOBAL...</p>';
            
            try {
                const [liveSnap, excelSnap] = await Promise.all([
                    db.collection("reports").orderBy("timestamp", "desc").limit(50).get(),
                    db.collection("kes_penguatkuasaan").limit(50).get()
                ]);

                list.innerHTML = '';
                const render = (doc, src) => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = "bg-slate-50 p-4 rounded-2xl border cursor-pointer hover:border-indigo-500 transition relative group";
                    div.onclick = () => loadToEdit(doc.id, d, src);
                    
                    let delBtn = (userRole === 'ADMIN') ? `<button onclick="event.stopPropagation(); deleteRec('${doc.id}', '${src}')" class="absolute top-2 right-2 p-2 text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '';

                    div.innerHTML = `
                        <p class="text-[9px] font-black text-indigo-600">#${d.BIL || '-'} [${src.toUpperCase()}]</p>
                        <h4 class="font-bold text-[10px] uppercase">${d.KESALAHAN || d['KESALAHAN'] || 'TIADA TAJUK'}</h4>
                        <div class="flex justify-between mt-2">
                            <span class="text-[8px] font-bold text-slate-400">${d.PENGUATKUASA || 'STAF'}</span>
                            <span class="text-[10px] font-black text-emerald-600">${d.JUMLAH_NILAI_KESELURUHAN || d['JUMLAH NILAI KESELURUHAN'] || 'RM 0'}</span>
                        </div>${delBtn}`;
                    list.appendChild(div);
                };

                liveSnap.forEach(d => render(d, 'reports'));
                excelSnap.forEach(d => render(d, 'kes_penguatkuasaan'));
                lucide.createIcons();
            } catch (e) { alert(e.message); }
        }

        function loadToEdit(id, data, src) {
            resetForm();
            const form = document.getElementById('mainForm');
            document.getElementById('currentDocId').value = id;
            document.getElementById('currentSource').value = src;
            document.getElementById('btnSubmit').innerText = `KEMASKINI [${src.toUpperCase()}] #${data.BIL}`;

            Object.keys(data).forEach(key => {
                const formKey = fieldMapping[key] || key;
                if(form.elements[formKey]) {
                    form.elements[formKey].value = data[key];
                }
            });
            updateCalculations();
            toggleHistory();
        }

        async function deleteRec(id, src) {
            if(confirm("Padam kekal?")) {
                await db.collection(src).doc(id).delete();
                fetchHistory();
            }
        }

        function updateCalculations() {
            let total = 0;
            document.querySelectorAll('.calc-rm').forEach(i => total += Number(i.value || 0));
            document.getElementById('disp_rm').value = "RM " + total.toLocaleString('en-US', {minimumFractionDigits:2});
        }

        document.addEventListener('input', e => { if(e.target.classList.contains('calc-rm')) updateCalculations(); });
        function resetForm() { document.getElementById('mainForm').reset(); document.getElementById('currentDocId').value = ""; document.getElementById('currentSource').value = "reports"; document.getElementById('btnSubmit').innerText = "SIMPAN DATA DATABASE GLOBAL"; }
        function toggleHistory() { const s = document.getElementById('historySidebar'); s.style.left = (s.style.left === '0px') ? '-100%' : '0px'; if(s.style.left === '0px') fetchHistory(); }
        function toggleProfile() { const s = document.getElementById('profileSidebar'); s.style.right = (s.style.right === '0px') ? '-100%' : '0px'; }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        lucide.createIcons();
    </script>
</body>
</html>
